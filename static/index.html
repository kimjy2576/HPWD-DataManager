// ═══ Viewer 탭 ═══
function ViewerTab({cfg,autoLoad,clearAutoLoad}){
const[files,setFiles]=useState([]);
const[expandedGroups,setExpandedGroups]=useState({});
const[folderMap,setFolderMap]=useState(()=>{try{return JSON.parse(localStorage.getItem('vw_folderMap')||'{}')}catch{return{}}}); // {baseName: folderName}
const[folders,setFolders]=useState(()=>{try{return JSON.parse(localStorage.getItem('vw_folders')||'[]')}catch{return[]}}); // ["폴더1","폴더2"]
useEffect(()=>{try{localStorage.setItem('vw_folderMap',JSON.stringify(folderMap))}catch{}},[folderMap]);
useEffect(()=>{try{localStorage.setItem('vw_folders',JSON.stringify(folders))}catch{}},[folders]);
const[selFiles,setSelFiles]=useState(new Set());
const[cases,setCases]=useState([]);  // [{name,data:{col:[...]}}]
const[caseVis,setCaseVis]=useState({});
const[caseColors,setCaseColors]=useState({}); // {caseName: '#hex'}
const[loading,setLoading]=useState(false);
const[sub,setSub]=useState('chart'); // chart | psych | ph
const[lw,setLw]=useState(2);
const[xGap,setXGap]=useState(.25);
const[yGap,setYGap]=useState(.35);
// 시작 시 디폴트 자동 로드
useEffect(()=>{fetch(`${API}/api/default-viewer-settings`).then(r=>r.json()).then(d=>{
  if(d.lw!=null)setLw(d.lw);if(d.xGap!=null)setXGap(d.xGap);if(d.yGap!=null)setYGap(d.yGap);
  if(d.chartH!=null)setChartH(d.chartH);if(d.chartW!=null)setChartW(d.chartW);if(d.dragMode!=null)setDragMode(d.dragMode);
  // VwChart 마운트 후 tabs 복원 (지연 + ref 유효성 체크)
  if(d.tabs&&Array.isArray(d.tabs)){
    const tryApply=(retry=0)=>{
      if(vwChartRef?.current?.setTabs){
        vwChartRef.current.setTabs(d.tabs.map((t,i)=>({...t,id:Date.now()+i})));
      }else if(retry<20){setTimeout(()=>tryApply(retry+1),150)}
    };
    setTimeout(()=>tryApply(),300);
  }
}).catch(()=>{})},[]);
const vwChartRef=useRef(null);
const[dragMode,setDragMode]=useState('xy');
const[chartH,setChartH]=useState(750);
const[chartW,setChartW]=useState(0);

// 파일 목록 로드 (모든 CSV)
const reloadFiles=()=>fetch(`${API}/api/results`).then(r=>r.json()).then(d=>setFiles(d.filter(f=>f.name.includes('_calc')||f.name.includes('_merged')))).catch(()=>{});
useEffect(()=>{reloadFiles()},[]);

// autoLoad: Calc 완료 후 자동 로드
const[pendingLoad,setPendingLoad]=useState(false);
useEffect(()=>{if(!autoLoad?.length)return;
  fetch(`${API}/api/results`).then(r=>r.json()).then(d=>{
    const filtered=d.filter(f=>f.name.includes('_calc')||f.name.includes('_merged'));
    setFiles(filtered);
    const toSel=new Set(autoLoad.filter(fn=>filtered.some(f=>f.name===fn)));
    setSelFiles(toSel);
    setMergeMode('auto'); // auto: base명 매칭으로 merged+calc 병합
    if(clearAutoLoad)clearAutoLoad();
    setPendingLoad(true);
  }).catch(()=>{});
},[autoLoad]);

const[mergeMode,setMergeMode]=useState('auto'); // 'auto' | 'all' | 'each'

// 데이터 로드
const[loadMsg,setLoadMsg]=useState('');
const[dbg,setDbg]=useState('');
const loadData=async()=>{if(!selFiles.size)return;setLoading(true);setLoadMsg('');setDbg('');
  const logs=[];const errs=[];
  // 파일 목록 순서 유지 (Set → 정렬된 배열)
  const orderedSel=files.filter(f=>selFiles.has(f.name)).map(f=>f.name);

  // ── 그룹핑 ──
  const groups=new Map(); // groupName → [fn, fn, ...]
  if(mergeMode==='all'){
    groups.set('All_merged',[...orderedSel]);
  }else if(mergeMode==='each'){
    for(const fn of orderedSel)groups.set(fn.replace(/\.csv$/,''),[fn]);
  }else{
    // auto: 1차 source_dir, 2차 base명으로 그룹핑
    const fileInfo=new Map();files.forEach(f=>fileInfo.set(f.name,f));
    const getBase=fn=>fn.replace(/_calc_formula\.csv$/,'').replace(/_formula\.csv$/,'').replace(/_calc\.csv$/,'').replace(/_merged\.csv$/,'').replace(/\.csv$/,'');
    const baseMap=new Map(); // groupKey → [fn]
    for(const fn of orderedSel){
      const f=fileInfo.get(fn);
      let key;
      if(f?.source_dir){
        key='dir:'+f.source_dir;
      }else{
        key='base:'+getBase(fn);
      }
      if(!baseMap.has(key))baseMap.set(key,[]);
      baseMap.get(key).push(fn);
    }
    // 자동으로 매칭되는 formula 파일 포함 (선택 안 했어도)
    for(const[key,fns] of baseMap){
      if(key.startsWith('base:')){
        const base=key.slice(5);
        files.forEach(f=>{
          if(f.name.includes('_formula')&&getBase(f.name)===base&&!fns.includes(f.name)){
            fns.push(f.name);
          }
        });
      }
    }
    for(const[key,fns] of baseMap){
      // 그룹명: 폴더명 또는 base명
      let gn;
      if(key.startsWith('dir:')){
        const dir=key.slice(4);
        gn=dir.includes('/')||dir.includes('\\')?dir.split(/[\\/]/).pop():dir;
      }else{
        gn=key.slice(5); // 'base:' 제거
      }
      if(baseMap.size>1&&groups.has(gn))gn+='_'+(groups.size+1);
      groups.set(gn,fns);
    }
  }
  logs.push(`모드: ${mergeMode}, ${groups.size}그룹`);

  const arr=[];
  for(const[groupName,fileList] of groups){
    logs.push(`\n[${groupName}] 파일 ${fileList.length}개`);
    const merged={};let totalRows=0;const allCols=new Set();
    // calc 먼저 (계산 결과 우선)
    const sorted=[...fileList].sort((a,b)=>{
      const pa=a.includes('_formula')?2:a.includes('_calc')?1:0;
      const pb=b.includes('_formula')?2:b.includes('_calc')?1:0;
      return pb-pa; // formula > calc > merged
    });
    for(const fn of sorted){
      try{
        const r=await fetch(`${API}/api/viewer-data/${encodeURIComponent(fn)}`);
        if(!r.ok){errs.push(`${fn}: ${r.status}`);continue}
        const txt=await r.text();
        let d;try{d=JSON.parse(txt)}catch(pe){errs.push(`${fn}: JSON파싱실패`);continue}
        if(!d.data||!d.columns?.length)continue;
        let nc=0;
        for(const col of d.columns){if(!merged[col]){merged[col]=d.data[col];allCols.add(col);nc++}}
        totalRows=Math.max(totalRows,d.rows);
        logs.push(`  + ${fn}: ${d.columns.length}col (${nc}신규), ${d.rows}rows`);
      }catch(e){errs.push(`${fn}: ${e.message}`)}
    }
    if(!Object.keys(merged).length){errs.push(`${groupName}: 데이터 없음`);continue}

    // ── 후처리 ──
    const D=merged;const added=[];
    if(!D.AH_Eva_In&&D.T_Air_Eva_In&&D.RH_Eva_In){
      D.AH_Eva_In=D.T_Air_Eva_In.map((t,i)=>t!=null&&D.RH_Eva_In[i]!=null?+wFromRH(t,D.RH_Eva_In[i]).toFixed(5):null);added.push('AH_Eva_In');
    }
    const tEO=D.T_Air_Eva_Out||D.T_Eva_Out;
    if(!D.AH_Cond_In&&tEO){
      D.AH_Cond_In=tEO.map((t,i)=>{if(t==null)return null;const rh=D.RH_Eva_Out?.[i]??0.95;return+wFromRH(t,rh).toFixed(5)});added.push('AH_Cond_In');
      if(!D.T_Air_Eva_Out&&D.T_Eva_Out){D.T_Air_Eva_Out=[...D.T_Eva_Out];added.push('T_Air_Eva_Out')}
    }
    if(!D.AH_Cond_Out&&D.AH_Cond_In){D.AH_Cond_Out=[...D.AH_Cond_In];added.push('AH_Cond_Out')}
    if(!D.h_Comp_In_ref&&D.P_Comp_In&&(D.T_Comp_In||D.T_Eva_Out)){
      try{
        const body={T_Comp_In:D.T_Comp_In||D.T_Eva_Out,T_Comp_Out:D.T_Comp_Out||D.T_Cond_In,T_Cond_Out:D.T_Cond_Out,P_Comp_In:D.P_Comp_In,P_Comp_Out:D.P_Comp_Out,refrigerant:cfg?.environment?.refrigerant||'R290',patm:cfg?.environment?.patm||101.325};
        const hr=await fetch(`${API}/api/compute-enthalpy`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
        if(hr.ok){const hd=await hr.json();
          if(hd.h_Comp_In){D.h_Comp_In_ref=hd.h_Comp_In;added.push('h_Comp_In_ref')}
          if(hd.h_Comp_Out){D.h_Comp_Out_ref=hd.h_Comp_Out;added.push('h_Comp_Out_ref')}
          if(hd.h_Cond_Out){D.h_Cond_Out_ref=hd.h_Cond_Out;D.h_Eva_In_ref=hd.h_Cond_Out;added.push('h_Cond_Out_ref','h_Eva_In_ref')}
        }
      }catch(e){logs.push(`  P-h 실패: ${e.message}`)}
    }
    added.forEach(k=>allCols.add(k));
    if(added.length)logs.push(`  자동계산: ${added.join(', ')}`);
    // 주요 선도 컬럼 체크
    const psychCk=['T_Air_Eva_In','AH_Eva_In','AH_Cond_In','T_Air_Cond_Out','AH_Cond_Out'].map(k=>allCols.has(k)?'✓':'✗');
    logs.push(`  습공기: ${psychCk.join(' ')}`);
    logs.push(`  → ${groupName}: ${allCols.size}col, ${totalRows}rows`);
    arr.push({name:groupName,data:D,columns:[...allCols],rows:totalRows});
  }
  logs.push(`\n총 ${arr.length}건`);setDbg(logs.join('\n'));
  setCases(arr);const v={};arr.forEach(c=>v[c.name]=true);setCaseVis(v);setLoading(false);
  if(arr.length)setLoadMsg(`✅ ${arr.length}개 케이스 (${arr.reduce((s,c)=>s+c.rows,0)}행)`);
  if(errs.length)setLoadMsg(m=>(m?m+' / ':'')+'❌ '+errs.join(', '));
};

// autoLoad 트리거: 파일 선택 완료 후 자동 로드
useEffect(()=>{if(pendingLoad&&selFiles.size>0){setPendingLoad(false);loadData()}},[pendingLoad,selFiles.size]);

const[filterMode,setFilterMode]=useState('');
const selAll=useCallback(()=>{const s=new Set();files.forEach(f=>s.add(f.name));setSelFiles(s);setFilterMode('all')},[files]);
const selCalc=useCallback(()=>{const s=new Set();files.forEach(f=>{if(f.name.includes('_calc')&&!f.name.includes('_formula'))s.add(f.name)});setSelFiles(s);setFilterMode('calc')},[files]);
const selMerged=useCallback(()=>{const s=new Set();files.forEach(f=>{if(f.name.includes('_merged'))s.add(f.name)});setSelFiles(s);setFilterMode('merged')},[files]);
const selFormula=useCallback(()=>{const s=new Set();files.forEach(f=>{if(f.name.includes('_formula'))s.add(f.name)});setSelFiles(s);setFilterMode('formula')},[files]);
const selNone=useCallback(()=>{setSelFiles(new Set());setFilterMode('')},[]);

return(<div>
  {/* 파일 선택 */}
  <div className="cd">
    <div className="ct">데이터 파일 선택</div>

    {/* 로컬 파일 불러오기 */}
    <LocalImport onImported={reloadFiles} addSuffix={false} filterMergedCalc={true}/>

    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6,marginTop:10}}>
      <span className="it">{files.length}개 파일 — {selFiles.size}개 선택</span>
      <div style={{display:'flex',gap:6}}>
        <button className={`bt bs ${filterMode==='all'?'on':''}`} style={filterMode==='all'?{background:'var(--teal)',borderColor:'var(--teal)',color:'#fff'}:{}} onClick={selAll}>전체</button>
        <button className={`bt bs ${filterMode==='calc'?'on':''}`} style={filterMode==='calc'?{background:'var(--teal)',borderColor:'var(--teal)',color:'#fff'}:{}} onClick={selCalc}>calc</button>
        <button className={`bt bs ${filterMode==='merged'?'on':''}`} style={filterMode==='merged'?{background:'var(--teal)',borderColor:'var(--teal)',color:'#fff'}:{}} onClick={selMerged}>merged</button>
        <button className={`bt bs ${filterMode==='formula'?'on':''}`} style={filterMode==='formula'?{background:'var(--teal)',borderColor:'var(--teal)',color:'#fff'}:{}} onClick={selFormula}>formula</button>
        <button className="bt bs" onClick={selNone}>해제</button>
        <button className="bt bs" onClick={reloadFiles}>새로고침</button>
        <button className="bt bs" style={{borderColor:'rgba(239,68,68,.3)',color:'var(--red)'}} onClick={async()=>{
          if(!selFiles.size)return;if(!confirm(`선택된 ${selFiles.size}개 파일을 삭제하시겠습니까?`))return;
          let ok=0,fail=0;
          for(const fn of selFiles){try{const r=await fetch(`${API}/api/results/${encodeURIComponent(fn)}`,{method:'DELETE'});if(r.ok)ok++;else{fail++;console.error('삭제 실패:',fn,r.status)}}catch(e){fail++;console.error('삭제 에러:',fn,e)}}
          if(fail)alert(`${ok}개 삭제, ${fail}개 실패`);
          setSelFiles(new Set());reloadFiles();
        }}>선택 삭제</button>
      </div>
    </div>
    <div className="it" style={{marginBottom:6}}>💡 "자동" 모드: 같은 base명의 merged+calc+formula를 자동으로 하나의 케이스로 병합합니다.</div>
    {files.length>0?(()=>{
      // base명 기준 그룹핑 (_merged, _calc, _formula 접미사 제거)
      const getBase=n=>n.replace(/_(merged|calc|formula)\.(csv|xlsx|xls)$/i,'').replace(/\.(csv|xlsx|xls)$/i,'');
      const groups={};
      files.forEach(f=>{
        const base=getBase(f.name);
        if(!groups[base])groups[base]={base,files:[]};
        groups[base].files.push(f);
      });
      // 폴더 구조: 각 base는 folderMap에 따라 폴더에 배정, 없으면 '(분류 없음)'
      const allBases=Object.keys(groups);
      const folderBuckets={};
      folders.forEach(fn=>{folderBuckets[fn]=[]});
      const UNSORTED='(분류 없음)';
      folderBuckets[UNSORTED]=[];
      allBases.forEach(b=>{
        const fn=folderMap[b];
        if(fn&&folders.includes(fn))folderBuckets[fn].push(b);
        else folderBuckets[UNSORTED].push(b);
      });
      // 각 폴더 내 base 정렬
      Object.values(folderBuckets).forEach(arr=>arr.sort((a,b)=>a.localeCompare(b)));
      
      const expandAll=()=>{const n={};[...folders,UNSORTED].forEach(f=>n['__folder__'+f]=true);allBases.forEach(b=>n[b]=true);setExpandedGroups(n)};
      const collapseAll=()=>{const n={};[...folders,UNSORTED].forEach(f=>n['__folder__'+f]=false);allBases.forEach(b=>n[b]=false);setExpandedGroups(n)};
      const addFolder=()=>{const name=prompt('새 폴더 이름:');if(!name||!name.trim())return;if(folders.includes(name.trim())){alert('이미 존재함');return}setFolders(p=>[...p,name.trim()])};
      const removeFolder=(fn)=>{if(!confirm(`폴더 "${fn}" 삭제? (하위 케이스는 분류 없음으로 이동)`))return;setFolders(p=>p.filter(x=>x!==fn));setFolderMap(p=>{const n={...p};Object.keys(n).forEach(b=>{if(n[b]===fn)delete n[b]});return n})};
      const renameFolder=(fn)=>{const nn=prompt('새 이름:',fn);if(!nn||!nn.trim()||nn===fn)return;if(folders.includes(nn.trim())){alert('이미 존재함');return}setFolders(p=>p.map(x=>x===fn?nn.trim():x));setFolderMap(p=>{const n={...p};Object.keys(n).forEach(b=>{if(n[b]===fn)n[b]=nn.trim()});return n})};
      const moveBaseToFolder=(base,fn)=>{setFolderMap(p=>{const n={...p};if(fn)n[base]=fn;else delete n[base];return n})};
      
      const renderBase=(b)=>{
        const g=groups[b];
        const isExp=expandedGroups[b]!==false;
        const allSel=g.files.every(f=>selFiles.has(f.name));
        const someSel=g.files.some(f=>selFiles.has(f.name));
        const toggleGroup=()=>{setSelFiles(p=>{const s=new Set(p);if(allSel)g.files.forEach(f=>s.delete(f.name));else g.files.forEach(f=>s.add(f.name));return s});setFilterMode('')};
        const toggleExp=()=>setExpandedGroups(p=>({...p,[b]:!isExp}));
        const currentFolder=folderMap[b]||'';
        return(<div key={b} style={{borderBottom:'1px solid var(--bd)'}}>
          <div style={{display:'flex',alignItems:'center',gap:6,padding:'4px 8px 4px 20px',background:'var(--bg)',cursor:'pointer'}}>
            <button onClick={toggleExp} style={{fontSize:10,padding:'0 4px',border:0,background:0,color:'var(--tx2)',cursor:'pointer',width:16}}>{isExp?'▼':'▶'}</button>

            <span onClick={toggleExp} style={{flex:1,fontSize:12,fontWeight:500,color:'var(--tx)',fontFamily:'var(--mono)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={b}>📄 {b}</span>
            <select value={currentFolder} onChange={e=>moveBaseToFolder(b,e.target.value)} onClick={e=>e.stopPropagation()} style={{fontSize:9,padding:'1px 3px',background:'var(--bg2)',border:'1px solid var(--bd2)',borderRadius:3,color:'var(--tx3)',maxWidth:100}} title="폴더로 이동">
              <option value="">(미분류)</option>
              {folders.map(fn=><option key={fn} value={fn}>📁 {fn}</option>)}
            </select>
            <span style={{fontSize:9,color:'var(--tx3)',minWidth:24,textAlign:'right'}}>{g.files.filter(f=>selFiles.has(f.name)).length}/{g.files.length}</span>
          </div>
          {isExp&&g.files.map((f)=>(<div key={f.name} className="file-sel-item" style={{display:'flex',alignItems:'center',gap:6,padding:'3px 8px 3px 48px',borderTop:'1px solid var(--bd)'}}>
            <input type="checkbox" checked={selFiles.has(f.name)} onChange={()=>{setSelFiles(p=>{const s=new Set(p);s.has(f.name)?s.delete(f.name):s.add(f.name);return s});setFilterMode('')}} style={{accentColor:'var(--teal)'}}/>
            <span style={{flex:1,fontFamily:'var(--mono)',fontSize:11,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={f.name}>{f.name}</span>

            {f.name.includes('_calc')&&!f.name.includes('_formula')&&<span className="rt rt-c">calc</span>}

          <button className="bt bs" onClick={collapseAll} style={{fontSize:9,padding:'2px 8px'}}>⊟ 모두 접기</button>
          <span style={{width:1,height:12,background:'var(--bd2)',margin:'0 4px'}}/>
          <button className="bt bs" onClick={addFolder} style={{fontSize:9,padding:'2px 8px',color:'var(--teal)',borderColor:'var(--teal)'}}>+ 폴더</button>

          <span style={{color:'var(--tx3)',fontSize:9}}>{allBases.length}개 케이스 / {folders.length}개 폴더</span>

            if(fn===UNSORTED&&bases.length===0)return null; // 미분류 비어있으면 숨김
            const isUnsorted=fn===UNSORTED;
            const fExp=expandedGroups['__folder__'+fn]!==false;
            const fToggle=()=>setExpandedGroups(p=>({...p,['__folder__'+fn]:!fExp}));
            // 폴더 내 모든 파일 개수
            const fFiles=bases.flatMap(b=>groups[b].files);
            const fAllSel=fFiles.length>0&&fFiles.every(f=>selFiles.has(f.name));
            const fSomeSel=fFiles.some(f=>selFiles.has(f.name));
            const fToggleSel=()=>{setSelFiles(p=>{const s=new Set(p);if(fAllSel)fFiles.forEach(f=>s.delete(f.name));else fFiles.forEach(f=>s.add(f.name));return s});setFilterMode('')};

                <input type="checkbox" checked={fAllSel} ref={el=>{if(el)el.indeterminate=fSomeSel&&!fAllSel}} onChange={fToggleSel} onClick={e=>e.stopPropagation()} style={{accentColor:'var(--teal)'}}/>
                <span onClick={fToggle} style={{flex:1,fontSize:12,color:isUnsorted?'var(--tx3)':'var(--teal)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{isUnsorted?'📂':'📁'} {fn} <span style={{fontSize:9,color:'var(--tx3)',fontWeight:400}}>({bases.length})</span></span>
                {!isUnsorted&&<>
                  <button onClick={e=>{e.stopPropagation();renameFolder(fn)}} style={{fontSize:9,padding:'1px 5px',border:'1px solid var(--bd2)',background:'var(--bg)',color:'var(--tx3)',borderRadius:3,cursor:'pointer'}} title="이름 변경">✏️</button>
                  <button onClick={e=>{e.stopPropagation();removeFolder(fn)}} style={{fontSize:9,padding:'1px 5px',border:'1px solid rgba(239,68,68,.3)',background:'rgba(239,68,68,.05)',color:'var(--red)',borderRadius:3,cursor:'pointer'}} title="폴더 삭제">×</button>
                </>}
              </div>
              {fExp&&bases.map(b=>renderBase(b))}
            </div>);
          })}
        </div>
      </>);
    })():<div className="it" style={{padding:16,textAlign:'center'}}>결과 파일이 없습니다.</div>}
    <div style={{display:'flex',gap:8,alignItems:'center',marginTop:8,flexWrap:'wrap'}}>
      <button className="bt bg" onClick={loadData} disabled={loading||!selFiles.size}>{loading?'로딩 중...':'데이터 로드 ('+selFiles.size+'개)'}</button>
      <span style={{fontSize:11,color:'var(--tx2)'}}>병합:</span>
      {[['auto','자동 (같은 폴더)'],['all','전부 합침'],['each','개별 케이스']].map(([v,lb])=>

          <input type="radio" name="mm" checked={mergeMode===v} onChange={()=>setMergeMode(v)} style={{accentColor:'var(--teal)'}}/>{lb}
        </label>)}

  </div>

  {cases.length>0&&<>
  {/* 서브탭 */}
  <div style={{display:'flex',gap:3,marginBottom:10,background:'var(--bg3)',padding:3,borderRadius:'var(--r)'}}>{[['chart','개별선도'],['psych','습공기 선도'],['ph','P-h 선도'],['perf','성능 비교']].map(([k,lb])=>
    <button key={k} className={`tb ${sub===k?'on':''}`} onClick={()=>setSub(k)} style={sub!==k?{border:'1px solid var(--bd2)',background:'var(--bg)'}:{}}>{lb}</button>)}</div>

    {cases.map((c,i)=>{const col=caseColors[c.name]||VW_COLORS[i%VW_COLORS.length];

      return(<div key={c.name} style={{display:'flex',alignItems:'center',gap:4,padding:'3px 6px',borderBottom:'1px solid var(--bd)'}}>

        </div>
        <input type="color" value={col} onChange={e=>setCaseColors(p=>({...p,[c.name]:e.target.value}))} title="색상 변경" style={{width:18,height:18,padding:0,border:'1px solid var(--bd2)',borderRadius:3,cursor:'pointer'}}/>

        </button>
        <button onClick={()=>{const n=prompt('케이스 이름:',c.label||c.name);if(n)setCases(prev=>prev.map(cc=>cc.name===c.name?{...cc,label:n}:cc))}} title="이름 변경" style={{padding:'2px 4px',border:'1px solid var(--bd2)',borderRadius:3,background:'var(--bg3)',color:'var(--tx3)',cursor:'pointer',fontSize:9}}>✏️</button>

      </div>)})}
    </div>
  </div>

  <ErrorBound>
  <div style={{display:sub==='chart'?'block':'none'}}><VwChart vwRef={vwChartRef} cases={cases} caseVis={caseVis} caseColors={caseColors} lw={lw} setLw={setLw} chartH={chartH} setChartH={setChartH} chartW={chartW} setChartW={setChartW} dragMode={dragMode} setDragMode={setDragMode} xGap={xGap} setXGap={setXGap} yGap={yGap} setYGap={setYGap}/></div>

  </ErrorBound>
  </>}
</div>)}

  Quality_x:'건도 [-]',
  // 제어
  Ctrl_Comp_Hz:'압축기 주파수 [Hz]',HP_CompCurrentHz:'압축기 주파수 [Hz]',HP_CompTargetHz:'압축기 목표 주파수 [Hz]',
  HP_F_Temp:'F 온도 [°C]',HP_EEV_Position:'팽창밸브 개도 [pulse]',HP_FanSpeed:'팬 회전수 [rpm]',
  'HP Fan Q Current':'팬 전류 [A]','HP Comp Current':'압축기 전류 [A]',
  HP_SuperHeatDegree:'과열도 (센서) [K]',HP_CoolingFan:'쿨링팬 [-]',HP_CompIpmTemp:'IPM 온도 [°C]',HP_FanIpmTemp:'팬 IPM 온도 [°C]',
  Ctrl_DryMotion:'건조 모션 [-]',
  // 기타 merged
  Current_RPM:'현재 RPM [rpm]',Request_RPM:'목표 RPM [rpm]',Wash_Temp:'세탁 온도 [°C]',Dry_Temp:'건조 온도 [°C]',
  fTemp_calc:'F온도 계산 [°C]',Time_min:'시간 [min]',Time_sec:'시간 [sec]',
};
const yTitle=k=>VL[k]?`<b>${VL[k]}</b>`:`<b>${k}</b>`;

// ═══ Viewer: 라인차트 ═══
function VwChart({vwRef,cases,caseVis,caseColors,lw,setLw,chartH,setChartH,chartW,setChartW,dragMode,setDragMode,xGap,setXGap,yGap,setYGap}){
  const allVars=useMemo(()=>{
    if(!cases?.length)return[];
    const s=new Set();
    cases.forEach(c=>{if(c?.data)Object.keys(c.data).forEach(k=>{if(!/^Time/i.test(k))s.add(k)})});
    // 라벨(VL) 기준 가나다 정렬 — 한국어 라벨이 없으면 변수명으로 정렬
    return[...s].sort((a,b)=>(VL[a]||a).localeCompare(VL[b]||b,'ko'));
  },[cases]);

  // 탭 = 카테고리 (생성/삭제 가능)
  const initTabs=()=>{
    const ts=VW_CATS.map((c,i)=>{
      const av=c.vars.filter(k=>cases.some(cs=>cs?.data?.[k]));
      const r=c.rows||3,cl=c.cols||3;
      return{id:i,name:c.name,rows:r,cols:cl,plots:av.slice(0,r*cl)}
    });
    return ts;
  };
  const[tabs,setTabs]=useState(()=>initTabs());
  const[tabIdx,setTabIdx]=useState(0);
  // vwRef로 tabs/setTabs 외부 노출 (디폴트 저장/불러오기용)
  useEffect(()=>{if(vwRef)vwRef.current={getTabs:()=>tabs,setTabs:(t)=>setTabs(t)}},[tabs,vwRef]);
  // cases 변경 시 탭 재초기화
  useEffect(()=>{if(cases?.length)setTabs(initTabs())},[allVars.length]);

  const tab=tabs[tabIdx]||tabs[0];
  const updateTab=(upd)=>setTabs(ts=>ts.map((t,i)=>i===tabIdx?{...t,...upd}:t));
  const removeTab=(i)=>{if(tabs.length<=1)return;setTabs(ts=>ts.filter((_,j)=>j!==i));setTabIdx(ti=>Math.min(ti,tabs.length-2))};
  const addCustomTab=()=>{
    const name=prompt('새 탭 이름:','커스텀');if(!name)return;
    setTabs(ts=>[...ts,{id:Date.now(),name,rows:3,cols:3,plots:[],yranges:{}}]);
    setTabIdx(tabs.length);
  };

  const[smOn,setSmOn]=useState(false);const[smM,setSmM]=useState('SMA');const[smW,setSmW]=useState(10);
  const[sideW,setSideW]=useState(()=>{try{return +localStorage.getItem('vwc_sideW')||320}catch{return 320}});
  useEffect(()=>{try{localStorage.setItem('vwc_sideW',String(sideW))}catch{}},[sideW]);
  const resizingRef=useRef(false);
  useEffect(()=>{
    const move=e=>{if(!resizingRef.current)return;const nw=Math.max(220,Math.min(600,e.clientX-16));setSideW(nw)};
    const up=()=>{resizingRef.current=false;document.body.style.cursor='';document.body.style.userSelect=''};
    window.addEventListener('mousemove',move);window.addEventListener('mouseup',up);
    return()=>{window.removeEventListener('mousemove',move);window.removeEventListener('mouseup',up)};
  },[]);
  const[err,setErr]=useState('');
  const ref=useRef(null);
  const lastFontRef=useRef('');  // 폰트 변경 감지 (purge 트리거)

  // 구간
  const[zones,setZones]=useState([]);const[zs,setZs]=useState('');const[ze,setZe]=useState('');
  const addZone=()=>{const a=parseFloat(zs),b=parseFloat(ze);if(isNaN(a)||isNaN(b)||a>=b)return;setZones(p=>[...p,{id:Date.now(),start:a,end:b}]);setZs('');setZe('')};

  // 변수 조작
  const setPlotVar=(si,v)=>{const np=[...tab.plots];np[si]=v;updateTab({plots:np})};
  const addPlot=()=>{const rest=allVars.filter(k=>!tab.plots.includes(k));if(rest.length)updateTab({plots:[...tab.plots,rest[0]]})};
  const removePlot=(i)=>updateTab({plots:tab.plots.filter((_,j)=>j!==i)});
  const movePlot=(from,to)=>{if(from===to)return;const np=[...tab.plots];const[m]=np.splice(from,1);np.splice(to,0,m);updateTab({plots:np})};
  const setYRange=(k,idx,val)=>{const yr={...(tab.yranges||{})};if(!yr[k])yr[k]=['',''];yr[k]=[...yr[k]];yr[k][idx]=val;updateTab({yranges:yr})};
  const clearYRange=(k)=>{const yr={...(tab.yranges||{})};delete yr[k];updateTab({yranges:yr})};

  // Fit
  const fitAll=()=>{if(!ref.current)return;try{
    const upd={};tab.plots.slice(0,tab.rows*tab.cols).forEach((_,i)=>{
      const ax=i===0?'':''.concat(i+1);
      upd['xaxis'+ax+'.autorange']=true;upd['yaxis'+ax+'.autorange']=true});
    Plotly.relayout(ref.current,upd)}catch(e){console.error(e)}};

  const containerRef=useRef(null);
  const[containerW,setContainerW]=useState(0);
  useEffect(()=>{if(!containerRef.current)return;
    const ro=new ResizeObserver(entries=>{for(const e of entries)setContainerW(e.contentRect.width)});
    ro.observe(containerRef.current);return()=>ro.disconnect()},[]);
  const finalW=chartW>0?chartW:(containerW>100?Math.round(containerW-10):undefined);

  useEffect(()=>{
    if(!ref.current||!tab.plots.length)return;setErr('');
    try{
      const nPlots=tab.plots.slice(0,tab.rows*tab.cols);
      const actR=Math.max(1,Math.min(tab.rows,Math.ceil(nPlots.length/tab.cols)));
      const actC=Math.max(1,Math.min(tab.cols,nPlots.length));
      const tr=[];const shapes=[];
      const totalH=Math.max(actR*120,chartH); // chartH가 총 높이, 행당 최소 120px

      const fontMap={sans:'system-ui,-apple-system,"Segoe UI",Roboto,sans-serif',mono:'ui-monospace,"SF Mono",Consolas,monospace',serif:'Georgia,"Times New Roman",serif'};
      const fontFamily=fontMap[tab.fontFamily||'sans'];
      const titleSize=tab.titleFontSize||11;
      const tickSize=tab.tickFontSize||10;
      const legendSize=tab.legendFontSize||11;
      const tBold=tab.titleBold!==false;
      // Plotly: font.weight는 bold|normal|700|400 지원 (4.x 이상)
      const titleFont={size:titleSize,family:fontFamily,...(tBold?{weight:700}:{})};
      const tickFont={size:tickSize,family:fontFamily};
      const legendFont={size:legendSize,family:fontFamily};
      // HTML 태그 기반 fallback (weight 미지원 버전 대응)
      const wrapB=(s)=>tBold?`<b>${s}</b>`:s;
      const yTitleClean=k=>VL[k]||k;  // <b> 래핑 제거 → font.weight로 처리
      const lo={grid:{rows:actR,columns:actC,pattern:'independent',xgap:xGap,ygap:yGap},height:totalH,width:finalW,margin:{t:30,b:50,l:80,r:30},paper_bgcolor:'rgba(255,255,255,0)',plot_bgcolor:'#ffffff',font:{family:fontFamily,color:'#3a3a4e',size:tickSize},showlegend:true,legend:{orientation:'h',y:1.06,x:.5,xanchor:'center',font:legendFont},hovermode:'x unified',dragmode:dragMode==='pan'?'pan':'zoom',shapes};
      const yRangeFor=k=>{
        const yr=tab.yranges?.[k];
        const hasMin=yr?.[0]!=null&&yr[0]!==''&&!isNaN(+yr[0]);
        const hasMax=yr?.[1]!=null&&yr[1]!==''&&!isNaN(+yr[1]);
        if(hasMin&&hasMax)return{range:[+yr[0],+yr[1]],autorange:false};
        // 한쪽만 있거나 둘 다 없으면 autorange 사용 (range 필드 명시적 제거)
        return{autorange:true,range:undefined};
      };
      nPlots.forEach((k,pi)=>{
        const xk='x'+(pi+1>1?pi+1:''),yk='y'+(pi+1>1?pi+1:'');
        lo['xaxis'+(pi+1)]={title:Math.floor(pi/actC)+1===actR?{text:wrapB('Time [min]'),font:titleFont}:undefined,gridcolor:'rgba(0,0,0,0.06)',tickfont:tickFont,zeroline:false,linecolor:'rgba(0,0,0,0.15)',linewidth:1,mirror:true,autorange:true};
        lo['yaxis'+(pi+1)]={title:{text:wrapB(yTitleClean(k)),font:titleFont},gridcolor:'rgba(0,0,0,0.06)',tickfont:tickFont,zeroline:false,linecolor:'rgba(0,0,0,0.15)',linewidth:1,mirror:true,
          ...yRangeFor(k)};
        zones.forEach((z,zi)=>{shapes.push({type:'rect',xref:xk,yref:yk+' domain',x0:z.start,x1:z.end,y0:0,y1:1,fillcolor:VW_ZC[zi%VW_ZC.length],line:{color:VW_ZB[zi%VW_ZB.length],width:1,dash:'dot'},layer:'below'})});
        cases.forEach((cs,ci)=>{
          if(!cs?.data||!caseVis[cs.name]||!cs.data[k])return;
          const xArr=cs.data.Time_min||cs.data.Time_sec||cs.data.Time;
          if(!xArr?.length)return;
          let yArr=cs.data[k];if(!yArr?.length)return;
          if(smOn&&yArr.length>3)try{yArr=vSmooth(yArr,smM,smW)}catch(e){}
          tr.push({x:xArr,y:yArr,type:'scattergl',mode:'lines',name:cs.label||cs.name,legendgroup:cs.name,showlegend:pi===0,line:{color:(caseColors?.[cs.name]||VW_COLORS[ci%VW_COLORS.length]),width:lw},xaxis:xk,yaxis:yk,hovertemplate:'%{y:.2f}<extra>'+(cs.label||cs.name)+'</extra>'});
        });
      });
      if(tr.length){
        // 폰트/Bold 변경 감지: Plotly.react의 layout diff가 font 변경 시 yaxis.autorange 복구 못해서
        // y축이 기본값 -1~4로 리셋되는 버그 있음 → 폰트 바뀌면 purge 후 newPlot으로 완전 재렌더
        const fontKey=`${tab.fontFamily||'sans'}|${titleSize}|${tickSize}|${legendSize}|${tBold?1:0}`;
        if(lastFontRef.current&&lastFontRef.current!==fontKey){
          try{Plotly.purge(ref.current)}catch(e){}
        }
        lastFontRef.current=fontKey;
        Plotly.react(ref.current,tr,lo,{responsive:!finalW,displaylogo:false,scrollZoom:true});
      }
      else setErr('표시할 데이터 없음');
    }catch(e){console.error('VwChart:',e);setErr('렌더링 오류: '+e.message)}
  },[cases,caseVis,caseColors,lw,chartH,finalW,tab,smOn,smM,smW,dragMode,zones,xGap,yGap]);

  // 구간 통계
  const zoneStats=useMemo(()=>zones.map(z=>{
    const stats=tab.plots.slice(0,tab.rows*tab.cols).map(k=>{
      const r={key:k};cases.forEach(cs=>{if(!caseVis[cs.name]||!cs?.data?.[k])return;
        const t=cs.data.Time_min||cs.data.Time_sec||cs.data.Time;if(!t)return;
        const vals=[];t.forEach((tv,i)=>{if(tv>=z.start&&tv<=z.end&&cs.data[k][i]!=null)vals.push(cs.data[k][i])});
        if(vals.length)r[cs.name]={min:Math.min(...vals).toFixed(2),avg:(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(2),max:Math.max(...vals).toFixed(2)}});
      return r});
    return{...z,stats}}),[zones,tab,cases,caseVis]);
  const visCase=cases.filter(c=>caseVis[c.name]);

  return(<>
  {/* ═══════════════════ 카테고리 (상단 가로 바) ═══════════════════ */}
  <div style={{display:'flex',gap:5,alignItems:'center',flexWrap:'wrap',padding:'5px 12px',background:'var(--bg3)',border:'1px solid var(--bd)',borderRadius:8,marginBottom:8,fontSize:11}}>
    <span style={{fontWeight:600,color:'var(--tx2)',fontSize:10,minWidth:50}}>카테고리</span>
    <span style={{width:1,height:14,background:'var(--bd2)'}}/>
    {tabs.map((t,i)=><div key={t.id} style={{display:'flex',alignItems:'center',gap:0}}>
      <button className={`bt bs ${tabIdx===i?'on':''}`} onClick={()=>setTabIdx(i)} style={{borderRadius:tabs.length>1&&i===tabIdx?'6px 0 0 6px':'6px',fontSize:10,padding:'3px 10px'}}>{t.name}</button>
      {tabs.length>1&&tabIdx===i&&<button onClick={()=>removeTab(i)} style={{padding:'3px 5px',fontSize:9,border:'1px solid var(--bd2)',background:'var(--bg)',color:'var(--red)',borderRadius:'0 6px 6px 0',cursor:'pointer',fontFamily:'var(--font)'}}>×</button>}
    </div>)}
    <button className="bt bs" onClick={addCustomTab} style={{fontSize:9,padding:'3px 8px'}}>+ 탭</button>
    <span style={{width:1,height:14,background:'var(--bd2)'}}/>
    <button className="bt bs" onClick={()=>{
      const cfg={version:1,type:'viewer_chart_settings',tabs:tabs.map(t=>({name:t.name,rows:t.rows,cols:t.cols,plots:t.plots,yranges:t.yranges||{}})),tabIdx,smOn,smM,smW,zones,timestamp:new Date().toISOString()};
      const blob=new Blob([JSON.stringify(cfg,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='viewer_chart_settings.json';a.click()
    }} style={{fontSize:9,padding:'3px 8px'}}>💾 저장</button>
    <button className="bt bs" onClick={()=>{const inp=document.createElement('input');inp.type='file';inp.accept='.json';inp.onchange=ev=>{
      const f=ev.target.files[0];if(!f)return;const rd=new FileReader();rd.onload=e=>{try{
        const c=JSON.parse(e.target.result);if(c.tabs){
          setTabs(c.tabs.map((t,i)=>({...t,id:Date.now()+i})));setTabIdx(c.tabIdx||0);
          if(c.smOn!=null)setSmOn(c.smOn);if(c.smM)setSmM(c.smM);if(c.smW)setSmW(c.smW);
          if(c.zones)setZones(c.zones);
        }}catch(er){alert('설정 파일 파싱 실패')}};rd.readAsText(f)};inp.click()
    }} style={{fontSize:9,padding:'3px 8px'}}>📂 불러오기</button>
  </div>

  <div style={{display:'grid',gridTemplateColumns:`${sideW}px 4px 1fr`,gap:0,alignItems:'start'}}>
  {/* ═══════════════════ 좌측 사이드바 ═══════════════════ */}
  <div style={{display:'flex',flexDirection:'column',gap:5,position:'sticky',top:8,alignSelf:'start',maxHeight:'calc(100vh - 20px)',overflowY:'auto',overflowX:'hidden',paddingRight:6,scrollbarGutter:'stable'}}>
    {/* ── 구역 2: 레이아웃 ── */}
    <div style={{padding:'4px 8px',background:'var(--bg3)',border:'1px solid var(--bd)',borderRadius:8,fontSize:11}}>
      <div style={{fontWeight:600,color:'var(--tx2)',fontSize:10,marginBottom:3}}>레이아웃</div>
      <div style={{display:'flex',gap:4,alignItems:'center',marginBottom:5}}>
        <span style={{color:'var(--tx3)',fontSize:10,minWidth:20}}>행</span>
        <select value={tab.rows} onChange={e=>{const r=+e.target.value;const need=r*tab.cols;
          if(tab.plots.length<need){const rest=allVars.filter(k=>!tab.plots.includes(k));updateTab({rows:r,plots:[...tab.plots,...rest.slice(0,need-tab.plots.length)]})}else{updateTab({rows:r})}
        }} style={{width:42,fontSize:11,padding:'2px 4px'}}>{[1,2,3,4].map(n=><option key={n} value={n}>{n}</option>)}</select>
        <span style={{color:'var(--tx3)',fontSize:10,minWidth:20}}>열</span>
        <select value={tab.cols} onChange={e=>{const c=+e.target.value;const need=tab.rows*c;
          if(tab.plots.length<need){const rest=allVars.filter(k=>!tab.plots.includes(k));updateTab({cols:c,plots:[...tab.plots,...rest.slice(0,need-tab.plots.length)]})}else{updateTab({cols:c})}
        }} style={{width:42,fontSize:11,padding:'2px 4px'}}>{[1,2,3,4].map(n=><option key={n} value={n}>{n}</option>)}</select>
        <span style={{fontSize:9,color:'var(--tx3)',fontFamily:'var(--mono)',marginLeft:4}}>{tab.rows}×{tab.cols}</span>
      </div>
      <div style={{display:'flex',gap:4,alignItems:'center'}}>
        <button className="bt bs" onClick={fitAll} style={{fontSize:9,padding:'2px 8px',flex:1}}>📐 Fit</button>
        <button className="bt bs" onClick={fitAll} style={{fontSize:9,padding:'2px 8px',flex:1}}>🔄 리셋</button>
      </div>
    </div>

    {/* ── 구역 3: 스무딩 ── */}
    <div style={{padding:'4px 8px',background:'var(--bg3)',border:'1px solid var(--bd)',borderRadius:8,fontSize:11}}>
      <div style={{display:'flex',alignItems:'center',gap:5,marginBottom:smOn?5:0}}>
        <label style={{display:'flex',alignItems:'center',gap:5,cursor:'pointer',fontWeight:600,color:'var(--tx2)',fontSize:10}}>
          <input type="checkbox" checked={smOn} onChange={e=>setSmOn(e.target.checked)} style={{accentColor:'var(--teal)'}}/>스무딩
        </label>
      </div>
      {smOn&&<div style={{display:'flex',gap:4,alignItems:'center'}}>
        <select value={smM} onChange={e=>setSmM(e.target.value)} style={{width:55,fontSize:10}}><option>SMA</option><option>EMA</option></select>
        <input type="range" min="3" max="120" value={smW} onChange={e=>setSmW(+e.target.value)} style={{flex:1}}/>
        <span style={{fontSize:9,fontFamily:'var(--mono)',color:'var(--tx3)',minWidth:32}}>w={smW}</span>
      </div>}
    </div>

    {/* ── 구역 4: 글꼴 ── */}
    <div style={{padding:'4px 8px',background:'var(--bg3)',border:'1px solid var(--bd)',borderRadius:8,fontSize:11}}>
      <div style={{fontWeight:600,color:'var(--tx2)',fontSize:10,marginBottom:3}}>글꼴</div>
      <div style={{display:'flex',gap:4,alignItems:'center',marginBottom:5}}>
        <select value={tab.fontFamily||'sans'} onChange={e=>updateTab({fontFamily:e.target.value})} style={{flex:1,fontSize:10,padding:'2px 4px'}}>
          <option value="sans">Sans</option>
          <option value="mono">Mono</option>
          <option value="serif">Serif</option>
        </select>
        <label style={{fontSize:10,color:'var(--tx3)',cursor:'pointer',display:'flex',alignItems:'center',gap:3}}><input type="checkbox" checked={tab.titleBold!==false} onChange={e=>updateTab({titleBold:e.target.checked})} style={{accentColor:'var(--teal)'}}/>Bold</label>
      </div>
      <div style={{display:'flex',gap:4,alignItems:'center',marginBottom:4}}>
        <span style={{color:'var(--tx3)',fontSize:10,minWidth:28}}>제목</span>
        <input type="number" min="6" max="32" value={tab.titleFontSize||11} onChange={e=>updateTab({titleFontSize:+e.target.value||11})} style={{width:44,fontSize:10,padding:'1px 3px'}}/>
        <span style={{color:'var(--tx3)',fontSize:10,minWidth:28,marginLeft:4}}>눈금</span>
        <input type="number" min="6" max="32" value={tab.tickFontSize||10} onChange={e=>updateTab({tickFontSize:+e.target.value||10})} style={{width:44,fontSize:10,padding:'1px 3px'}}/>
      </div>
      <div style={{display:'flex',gap:4,alignItems:'center'}}>
        <span style={{color:'var(--tx3)',fontSize:10,minWidth:28}}>레전드</span>
        <input type="number" min="6" max="32" value={tab.legendFontSize||11} onChange={e=>updateTab({legendFontSize:+e.target.value||11})} style={{width:44,fontSize:10,padding:'1px 3px'}}/>
      </div>
    </div>

    {/* ── 구역 5: 차트 스타일 (선/크기/간격) ── */}
    <div style={{padding:'4px 8px',background:'var(--bg3)',border:'1px solid var(--bd)',borderRadius:8,fontSize:11}}>
      <div style={{fontWeight:600,color:'var(--tx2)',fontSize:10,marginBottom:3}}>차트 스타일</div>
      <div style={{display:'flex',gap:4,alignItems:'center',marginBottom:4}}>
        <span style={{color:'var(--tx3)',fontSize:10,minWidth:40}}>선두께</span>
        <input type="range" min="1" max="5" step=".5" value={lw} onChange={e=>setLw(+e.target.value)} style={{flex:1,minWidth:0}}/>
        <span style={{fontFamily:'var(--mono)',color:'var(--tx2)',fontSize:10,minWidth:20,textAlign:'right'}}>{lw}</span>
      </div>
      <div style={{display:'flex',gap:4,alignItems:'center',marginBottom:4}}>
        <span style={{color:'var(--tx3)',fontSize:10,minWidth:40}}>높이</span>
        <input type="range" min="300" max="1600" step="10" value={chartH} onChange={e=>setChartH(+e.target.value)} style={{flex:1,minWidth:0}}/>
        <span style={{fontFamily:'var(--mono)',color:'var(--tx3)',fontSize:10,minWidth:40,textAlign:'right'}}>{chartH}px</span>
      </div>
      <div style={{display:'flex',gap:3,marginBottom:5}}>
        {[[400,'S'],[700,'M'],[1000,'L'],[1400,'XL']].map(([h,lb])=><button key={h} className={`bt bs ${chartH===h?'on':''}`} onClick={()=>setChartH(h)} style={{padding:'2px 0',fontSize:9,flex:1}}>{lb}</button>)}
      </div>
      <div style={{display:'flex',gap:4,alignItems:'center',marginBottom:4}}>
        <span style={{color:'var(--tx3)',fontSize:10,minWidth:40}}>너비</span>
        <input type="range" min="0" max="2000" step="50" value={chartW} onChange={e=>setChartW(+e.target.value)} style={{flex:1,minWidth:0}}/>
        <span style={{fontFamily:'var(--mono)',color:'var(--tx3)',fontSize:10,minWidth:40,textAlign:'right'}}>{chartW?chartW+'px':'자동'}</span>

        <button className={`bt bs ${chartW===0?'on':''}`} onClick={()=>setChartW(0)} style={{padding:'2px 0',fontSize:9,flex:1}}>자동</button>
        {[[900,'S'],[1200,'M'],[1500,'L']].map(([w,lb])=><button key={w} className={`bt bs ${chartW===w?'on':''}`} onClick={()=>setChartW(w)} style={{padding:'2px 0',fontSize:9,flex:1}}>{lb}</button>)}
      </div>
      <div style={{display:'flex',gap:4,alignItems:'center',marginBottom:4}}>
        <span style={{color:'var(--tx3)',fontSize:10,minWidth:40}}>간격 X</span>
        <input type="range" min="0.02" max="0.40" step=".01" value={xGap} onChange={e=>setXGap(+e.target.value)} style={{flex:1,minWidth:0}}/>
        <span style={{fontFamily:'var(--mono)',color:'var(--tx3)',fontSize:9,minWidth:30,textAlign:'right'}}>{xGap.toFixed(2)}</span>
      </div>
      <div style={{display:'flex',gap:4,alignItems:'center',marginBottom:5}}>
        <span style={{color:'var(--tx3)',fontSize:10,minWidth:40}}>간격 Y</span>
        <input type="range" min="0.05" max="0.50" step=".01" value={yGap} onChange={e=>setYGap(+e.target.value)} style={{flex:1,minWidth:0}}/>
        <span style={{fontFamily:'var(--mono)',color:'var(--tx3)',fontSize:9,minWidth:30,textAlign:'right'}}>{yGap.toFixed(2)}</span>
      </div>
      <button className="bt bs" onClick={()=>{setChartH(750);setChartW(0);setLw(2);setXGap(.25);setYGap(.35)}} style={{fontSize:9,padding:'2px 6px',color:'var(--tx3)',width:'100%'}}>↺ 스타일 초기화</button>
    </div>

    {/* ── 구역 6: 저장/불러오기 ── */}
    <div style={{padding:'4px 8px',background:'var(--bg3)',border:'1px solid var(--bd)',borderRadius:8,fontSize:11}}>
      <div style={{fontWeight:600,color:'var(--tx2)',fontSize:10,marginBottom:3}}>Viewer 디폴트</div>
      <div style={{display:'flex',gap:3}}>
        <button className="bt bs" onClick={async()=>{try{
          const t=vwRef?.current?.getTabs?.()||[];
          const tabsLite=t.map(x=>({name:x.name,rows:x.rows,cols:x.cols,plots:x.plots,yranges:x.yranges||{},fontFamily:x.fontFamily,titleFontSize:x.titleFontSize,tickFontSize:x.tickFontSize,legendFontSize:x.legendFontSize,titleBold:x.titleBold}));
          await fetch(`${API}/api/save-default-viewer-settings`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({lw,xGap,yGap,chartH,chartW,dragMode,tabs:tabsLite})});
          alert(`✅ Viewer 디폴트 저장\n- 공통 설정 (선두께/크기/간격)\n- 카테고리 ${tabsLite.length}개 (변수/Y축 범위/글꼴 포함)`);
        }catch(e){alert('실패: '+e.message)}}} style={{borderColor:'var(--teal)',color:'var(--teal)',fontSize:9,padding:'3px 6px',flex:1}}>⭐ 저장</button>
        <button className="bt bs" onClick={async()=>{try{
          const r=await fetch(`${API}/api/default-viewer-settings`);const d=await r.json();
          if(d.lw!=null)setLw(d.lw);if(d.xGap!=null)setXGap(d.xGap);if(d.yGap!=null)setYGap(d.yGap);
          if(d.chartH!=null)setChartH(d.chartH);if(d.chartW!=null)setChartW(d.chartW);if(d.dragMode!=null)setDragMode(d.dragMode);
          if(d.tabs&&Array.isArray(d.tabs)&&vwRef?.current?.setTabs){
            vwRef.current.setTabs(d.tabs.map((t,i)=>({...t,id:Date.now()+i})));
          }
          alert(`✅ 불러옴${d.tabs?`\n- 카테고리 ${d.tabs.length}개 복원`:''}`);
        }catch(e){alert('실패: '+e.message)}}} style={{color:'var(--teal)',fontSize:9,padding:'3px 6px',flex:1}}>⭐ 불러오기</button>
      </div>
    </div>

    {/* ── 구역 5: 변수 선택 + Y축 범위 ── */}
    <div style={{padding:'4px 8px',background:'var(--bg3)',border:'1px solid var(--bd)',borderRadius:8,fontSize:11}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:5}}>
        <span style={{fontWeight:600,color:'var(--tx2)',fontSize:10}}>변수 / Y축</span>
        <div style={{display:'flex',gap:4,alignItems:'center'}}>
          <span style={{fontSize:9,color:'var(--tx3)'}}>{tab.plots.slice(0,tab.rows*tab.cols).length}개</span>
          <button className="bt bs" onClick={addPlot} style={{fontSize:9,padding:'2px 6px'}}>+ 변수</button>
        </div>
      </div>
      <div style={{maxHeight:'28vh',overflowY:'auto'}}>
      {tab.plots.slice(0,tab.rows*tab.cols).map((k,i)=>{const yr=tab.yranges?.[k];const hasR=yr&&((yr[0]!=null&&yr[0]!=='')||(yr[1]!=null&&yr[1]!==''));
        return(<div key={i} style={{padding:'4px 2px',borderBottom:'1px solid var(--bd)'}}>
        {/* 1행: 순서 버튼 + 번호 + 변수 선택 + 삭제 */}
        <div style={{display:'flex',alignItems:'center',gap:3}}>
          <div style={{display:'flex',flexDirection:'column',gap:0}}>
            <button onClick={()=>movePlot(i,i-1)} disabled={i===0} style={{fontSize:6,lineHeight:'8px',padding:'0 2px',border:0,background:0,color:i===0?'var(--bd2)':'var(--tx3)',cursor:i===0?'default':'pointer'}}>▲</button>
            <button onClick={()=>movePlot(i,i+1)} disabled={i>=tab.plots.slice(0,tab.rows*tab.cols).length-1} style={{fontSize:6,lineHeight:'8px',padding:'0 2px',border:0,background:0,color:i>=tab.plots.slice(0,tab.rows*tab.cols).length-1?'var(--bd2)':'var(--tx3)',cursor:i>=tab.plots.slice(0,tab.rows*tab.cols).length-1?'default':'pointer'}}>▼</button>
          </div>

          <select value={k} onChange={e=>setPlotVar(i,e.target.value)} style={{flex:1,fontSize:11,padding:'3px 4px',background:'var(--bg)',border:'1px solid var(--bd2)',borderRadius:4,color:'var(--tx)',minWidth:0}}>
            {allVars.map(v=><option key={v} value={v}>{VL[v]||v}</option>)}
          </select>
          <button onClick={()=>removePlot(i)} title="삭제" style={{fontSize:10,border:0,background:0,color:'var(--red)',cursor:'pointer',padding:'0 4px'}}>×</button>
        </div>
        {/* 2행: Y축 min/max (들여쓰기) */}
        <div style={{display:'flex',gap:3,alignItems:'center',marginTop:3,paddingLeft:22}}>
          <span style={{fontSize:8,color:'var(--tx3)',minWidth:18}}>Y</span>
          <input type="text" inputMode="decimal" value={yr?.[0]??''} onChange={e=>setYRange(k,0,e.target.value)} placeholder="min" title="Y축 최소 (음수·소수 가능)" style={{width:50,fontSize:9,padding:'2px 3px',background:hasR?'rgba(59,130,246,.08)':'var(--bg)',border:'1px solid '+(hasR?'rgba(59,130,246,.3)':'var(--bd2)'),borderRadius:3,color:'var(--tx)',fontFamily:'var(--mono)',textAlign:'center'}}/>
          <span style={{fontSize:9,color:'var(--tx3)'}}>~</span>
          <input type="text" inputMode="decimal" value={yr?.[1]??''} onChange={e=>setYRange(k,1,e.target.value)} placeholder="max" title="Y축 최대 (음수·소수 가능)" style={{width:50,fontSize:9,padding:'2px 3px',background:hasR?'rgba(59,130,246,.08)':'var(--bg)',border:'1px solid '+(hasR?'rgba(59,130,246,.3)':'var(--bd2)'),borderRadius:3,color:'var(--tx)',fontFamily:'var(--mono)',textAlign:'center'}}/>
          {hasR&&<button onClick={()=>clearYRange(k)} title="Y축 자동" style={{fontSize:9,border:0,background:0,color:'var(--blue)',cursor:'pointer',padding:'0 3px'}}>↺</button>}
        </div>
      </div>)})}
      </div>
    </div>
  </div>

  {/* ═══════════════════ 리사이저 ═══════════════════ */}
  <div onMouseDown={()=>{resizingRef.current=true;document.body.style.cursor='col-resize';document.body.style.userSelect='none'}}
       style={{position:'sticky',top:8,height:'calc(100vh - 20px)',cursor:'col-resize',background:'var(--bd)',transition:'background .15s',margin:'0 3px'}}
       onMouseEnter={e=>e.currentTarget.style.background='var(--teal)'}
       onMouseLeave={e=>e.currentTarget.style.background='var(--bd)'}
       title="드래그로 사이드바 너비 조절"/>

  {/* ═══════════════════ 우측 메인 영역 ═══════════════════ */}
  <div style={{minWidth:0,paddingLeft:4}}>
    {err&&<div style={{padding:10,margin:'0 0 6px',background:'rgba(239,68,68,.1)',border:'1px solid rgba(239,68,68,.2)',borderRadius:8,fontSize:12,color:'var(--red)'}}>{err}</div>}
    {tab.plots.length>0?<div ref={containerRef} className="cd" style={{overflowX:'auto',padding:4}}><div ref={ref}/></div>
    :<div className="cd"><div className="it" style={{padding:20,textAlign:'center'}}>좌측에서 변수를 추가하세요.</div></div>}

    {/* 구간 */}
    <div style={{display:'flex',gap:6,alignItems:'center',marginTop:8,padding:'8px 12px',background:'var(--bg2,var(--bg3))',border:'1px solid var(--bd)',borderRadius:8,flexWrap:'wrap'}}>
      <span style={{fontSize:11,color:'var(--tx2)'}}>구간:</span>
      <input value={zs} onChange={e=>setZs(e.target.value)} placeholder="시작(min)" style={{width:80,fontSize:11,padding:'3px 6px'}}/>
      <span style={{color:'var(--tx3)'}}>~</span>
      <input value={ze} onChange={e=>setZe(e.target.value)} placeholder="종료(min)" style={{width:80,fontSize:11,padding:'3px 6px'}}/>
      <button className="bt bs" onClick={addZone}>추가</button>
      {zones.map((z,i)=><span key={z.id} style={{fontSize:10,padding:'2px 8px',background:VW_ZC[i%VW_ZC.length],border:'1px solid '+VW_ZB[i%VW_ZB.length],borderRadius:12,display:'flex',alignItems:'center',gap:4}}>
        {z.start}~{z.end}<button onClick={()=>setZones(p=>p.filter(x=>x.id!==z.id))} style={{border:0,background:'none',color:'var(--red)',cursor:'pointer',fontSize:10,padding:0}}>×</button>
      </span>)}
      {zones.length>0&&<button className="bt bs" onClick={()=>setZones([])} style={{fontSize:10}}>전체 삭제</button>}
    </div>

    {/* 구간 통계 */}
    {zoneStats.length>0&&<div style={{marginTop:8,border:'1px solid var(--bd)',borderRadius:8,overflow:'auto',maxHeight:250}}>
      <table style={{width:'100%',borderCollapse:'collapse',fontSize:11,fontFamily:'var(--mono)'}}>
        <thead><tr style={{background:'var(--bg3)'}}>
          <th style={{padding:'5px 8px',textAlign:'left',color:'var(--tx2)',position:'sticky',top:0,background:'var(--bg3)'}}>구간</th>
          <th style={{padding:'5px 8px',textAlign:'left',color:'var(--tx2)',position:'sticky',top:0,background:'var(--bg3)'}}>변수</th>
          {visCase.map(c=><th key={c.name} colSpan={3} style={{padding:'5px 8px',textAlign:'center',color:'var(--tx2)',position:'sticky',top:0,background:'var(--bg3)'}}>{c.name}</th>)}
        </tr><tr style={{background:'var(--bg3)'}}>
          <th/><th/>
          {visCase.map(c=><React.Fragment key={c.name}><th style={{padding:'3px 6px',textAlign:'right',fontSize:9,color:'var(--tx3)',position:'sticky',top:28,background:'var(--bg3)'}}>Min</th><th style={{padding:'3px 6px',textAlign:'right',fontSize:9,color:'var(--teal)',position:'sticky',top:28,background:'var(--bg3)'}}>Avg</th><th style={{padding:'3px 6px',textAlign:'right',fontSize:9,color:'var(--tx3)',position:'sticky',top:28,background:'var(--bg3)'}}>Max</th></React.Fragment>)}
        </tr></thead>
        <tbody>{zoneStats.map(z=>z.stats.map((st,si)=><tr key={z.id+'-'+si} style={{borderTop:'1px solid var(--bd)'}}>
          {si===0&&<td rowSpan={z.stats.length} style={{padding:'4px 8px',color:'var(--teal)',verticalAlign:'top'}}>{z.start}~{z.end}</td>}
          <td style={{padding:'4px 8px'}}>{st.key}</td>
          {visCase.map(c=>{const d=st[c.name];return d?<React.Fragment key={c.name}><td style={{padding:'3px 6px',textAlign:'right'}}>{d.min}</td><td style={{padding:'3px 6px',textAlign:'right',color:'var(--teal)'}}>{d.avg}</td><td style={{padding:'3px 6px',textAlign:'right'}}>{d.max}</td></React.Fragment>:<React.Fragment key={c.name}><td style={{textAlign:'center'}}>-</td><td style={{textAlign:'center'}}>-</td><td style={{textAlign:'center'}}>-</td></React.Fragment>})}
        </tr>))}</tbody>
      </table>
    </div>}
  </div>
  </div>
  </>)
}

// ═══ Viewer: 습공기 선도 ═══
function VwPsych({cases,caseVis,caseColors,lw,setLw,chartH,setChartH,chartW,setChartW,dragMode}){
  const findCol=(d,names)=>{for(const n of names){if(d[n])return d[n]}return null};
  const[timeR,setTimeR]=useState(.5);
  const[autoFit,setAutoFit]=useState(true);
  const[fixedRange,setFixedRange]=useState(null);
  const[fontFamily,setFontFamily]=useState('sans');
  const[titleFontSize,setTitleFontSize]=useState(12);
  const[tickFontSize,setTickFontSize]=useState(10);
  const[legendFontSize,setLegendFontSize]=useState(11);
  const[titleBold,setTitleBold]=useState(true);
  const ref=useRef(null);
  const timeIdx=useMemo(()=>cases.map(cs=>{const t=cs?.data?.Time_min||cs?.data?.Time_sec||cs?.data?.Time;if(!t||!t.length)return 0;const tgt=t[t.length-1]*timeR;let b=0;for(let i=1;i<t.length;i++){if(Math.abs(t[i]-tgt)<Math.abs(t[b]-tgt))b=i}return b}),[cases,timeR]);
  const curT=cases[0]?.data?.Time_min?.[timeIdx[0]]||cases[0]?.data?.Time_sec?.[timeIdx[0]]||0;

  // 누락 체크
  const dataStatus=useMemo(()=>{
    const found=new Set();cases.forEach(c=>{if(c?.data)Object.keys(c.data).forEach(k=>found.add(k))});
    const has=k=>found.has(k);
    const hasPt1=has('T_Air_Eva_In')&&has('AH_Eva_In');
    const hasPt2=(has('T_Air_Eva_Out')||has('T_Eva_Out'))&&has('AH_Cond_In');
    const hasPt3=has('T_Air_Cond_Out')&&has('AH_Cond_Out');
    return{hasPt1,hasPt2,hasPt3,anyPt:hasPt1||hasPt2||hasPt3,found:[...found]};
  },[cases]);

  useEffect(()=>{if(!ref.current)return;
    const fW=chartW>0?chartW:undefined;
    const tr=[...PSYCH_BG];
    const allT=[],allW=[];
    cases.forEach((cs,ci)=>{if(!caseVis[cs.name])return;const i=timeIdx[ci];const d=cs.data;if(!d)return;
      const pts=[];
      if(d.T_Air_Eva_In?.[i]!=null&&d.AH_Eva_In?.[i]!=null)pts.push([d.T_Air_Eva_In[i],d.AH_Eva_In[i],'①Eva In']);
      const tEvaOut=d.T_Air_Eva_Out?.[i]??d.T_Eva_Out?.[i];
      if(tEvaOut!=null&&d.AH_Cond_In?.[i]!=null)pts.push([tEvaOut,d.AH_Cond_In[i],'②Eva Out']);
      if(d.T_Air_Cond_Out?.[i]!=null&&d.AH_Cond_Out?.[i]!=null)pts.push([d.T_Air_Cond_Out[i],d.AH_Cond_Out[i],'③Cond Out']);
      pts.forEach(p=>{allT.push(p[0]);allW.push(p[1])});
      if(pts.length){
        const xs=[...pts.map(p=>p[0]),pts[0][0]],ys=[...pts.map(p=>p[1]),pts[0][1]],tx=[...pts.map(p=>p[2]),''];
        tr.push({x:xs,y:ys,mode:'lines+markers+text',text:tx,textposition:'top center',textfont:{size:12,color:(caseColors?.[cs.name]||VW_COLORS[ci%VW_COLORS.length]),family:'var(--font)'},marker:{size:12,line:{width:1,color:'#fff'}},line:{color:(caseColors?.[cs.name]||VW_COLORS[ci%VW_COLORS.length]),width:Math.max(lw,2.5)},name:cs.label||cs.name,hovertemplate:'T=%{x:.1f}°C<br>W=%{y:.4f}<extra></extra>'})}
    });
    // 데이터 기반 축 범위
    let xRange=[-5,70],yRange=[0,.032];
    if(allT.length>0){
      const tMin=Math.min(...allT),tMax=Math.max(...allT),tPad=Math.max((tMax-tMin)*.3,5);
      const wMin=Math.min(...allW),wMax=Math.max(...allW),wPad=Math.max((wMax-wMin)*.3,.002);
      const calcX=[Math.max(-5,tMin-tPad),Math.min(70,tMax+tPad)];
      const calcY=[Math.max(0,wMin-wPad),wMax+wPad];
      if(!fixedRange)setFixedRange({x:calcX,y:calcY});
      if(autoFit){xRange=calcX;yRange=calcY}
      else if(fixedRange){xRange=fixedRange.x;yRange=fixedRange.y}
    }
    const fontMap={sans:'system-ui,-apple-system,"Segoe UI",Roboto,sans-serif',mono:'ui-monospace,"SF Mono",Consolas,monospace',serif:'Georgia,"Times New Roman",serif'};
    const ff=fontMap[fontFamily]||fontMap.sans;
    const tFont={size:titleFontSize,family:ff,...(titleBold?{weight:700}:{})};
    const tkFont={size:tickFontSize,family:ff};
    const lgFont={size:legendFontSize,family:ff};
    const wB=s=>titleBold?'<b>'+s+'</b>':s;
    try{Plotly.react(ref.current,tr,{
      title:{text:'<b>습공기 선도</b>'+(dataStatus.anyPt?' (t='+curT.toFixed(1)+' min)':''),font:{size:14,family:ff},y:.98,yanchor:'top'},
      xaxis:{title:{text:wB('건구온도 [°C]'),font:tFont},range:xRange,gridcolor:'rgba(0,0,0,0.08)',linecolor:'rgba(0,0,0,0.2)',linewidth:1,mirror:true,zeroline:false,tickfont:tkFont},
      yaxis:{title:{text:wB('절대습도 [kg/kg]'),font:tFont},range:yRange,gridcolor:'rgba(0,0,0,0.08)',linecolor:'rgba(0,0,0,0.2)',linewidth:1,mirror:true,zeroline:false,tickfont:tkFont},
      height:chartH,width:fW,margin:{t:60,b:60,l:80,r:30},
      paper_bgcolor:'rgba(255,255,255,0)',plot_bgcolor:'#ffffff',
      font:{family:ff,color:'#3a3a4e',size:tickFontSize},
      legend:{orientation:'h',y:-.15,x:.5,xanchor:'center',font:lgFont,bgcolor:'rgba(255,255,255,0.8)'},
      hovermode:'closest',dragmode:dragMode==='pan'?'pan':'zoom'
    },{responsive:!fW,displaylogo:false,scrollZoom:true})}catch(e){console.error('VwPsych:',e)}
  },[cases,caseVis,caseColors,timeIdx,lw,chartH,chartW,dragMode,curT,dataStatus.anyPt,autoFit,fontFamily,titleFontSize,tickFontSize,legendFontSize,titleBold]);

  const stPts=useMemo(()=>cases.map((cs,ci)=>{if(!caseVis[cs.name])return null;const i=timeIdx[ci];const d=cs.data;if(!d)return null;
    const pts=[];
    if(d.T_Air_Eva_In?.[i]!=null&&d.AH_Eva_In?.[i]!=null){const T=d.T_Air_Eva_In[i],W=d.AH_Eva_In[i];pts.push({lb:'①증발기입구',T,W,h:hMoist(T,W),rh:rhFromAH(W,T),dp:dewPt(W),v:specVol(T,W)})}
    const tEO=d.T_Air_Eva_Out?.[i]??d.T_Eva_Out?.[i];
    if(tEO!=null&&d.AH_Cond_In?.[i]!=null){const T=tEO,W=d.AH_Cond_In[i];pts.push({lb:'②증발기출구',T,W,h:hMoist(T,W),rh:rhFromAH(W,T),dp:dewPt(W),v:specVol(T,W)})}
    if(d.T_Air_Cond_Out?.[i]!=null&&d.AH_Cond_Out?.[i]!=null){const T=d.T_Air_Cond_Out[i],W=d.AH_Cond_Out[i];pts.push({lb:'③응축기출구',T,W,h:hMoist(T,W),rh:rhFromAH(W,T),dp:dewPt(W),v:specVol(T,W)})}
    return pts.length?{name:cs.label||cs.name,color:(caseColors?.[cs.name]||VW_COLORS[ci%VW_COLORS.length]),pts}:null;
  }).filter(Boolean),[cases,caseVis,timeIdx]);

  // 디버그: 첫 케이스의 실제 값
  const psychDbg=useMemo(()=>{
    const c=cases.find(cs=>caseVis[cs.name]);if(!c?.data)return'활성 케이스 없음';
    const d=c.data,i=timeIdx[cases.indexOf(c)];
    const v=k=>{if(!d[k])return'없음';const val=d[k][i];return val!=null?(typeof val==='number'?val.toFixed(3):String(val)):'null'};
    return`[${c.name}] idx=${i}\n①T_Air_Eva_In=${v('T_Air_Eva_In')} AH_Eva_In=${v('AH_Eva_In')}\n②T_Air_Eva_Out=${v('T_Air_Eva_Out')} T_Eva_Out=${v('T_Eva_Out')} AH_Cond_In=${v('AH_Cond_In')}\n③T_Air_Cond_Out=${v('T_Air_Cond_Out')} AH_Cond_Out=${v('AH_Cond_Out')}`;
  },[cases,caseVis,timeIdx]);

  return(<div style={{display:'grid',gridTemplateColumns:'280px 1fr',gap:10,alignItems:'start'}}>

              <span>h: <b>{p.h.toFixed(1)}</b></span><span>Td: <b>{p.dp.toFixed(1)}°C</b></span><span>v: <b>{p.v.toFixed(3)}</b></span>
            </div>

}

// ═══ Viewer: P-h 선도 ═══
function VwPh({cases,caseVis,caseColors,lw,setLw,chartH,setChartH,chartW,setChartW,dragMode,cfg}){
  const hasRefData=useMemo(()=>cases.some(c=>c?.data?.h_Comp_In_ref||c?.data?.P_Comp_In),[cases]);
  const[timeR,setTimeR]=useState(.5);
  const[autoFit,setAutoFit]=useState(true);
  const[fixedRange,setFixedRange]=useState(null);
  const[refName,setRefName]=useState(cfg?.environment?.refrigerant||'R290');
  const[fontFamily,setFontFamily]=useState('sans');
  const[titleFontSize,setTitleFontSize]=useState(12);
  const[tickFontSize,setTickFontSize]=useState(10);
  const[legendFontSize,setLegendFontSize]=useState(11);
  const[titleBold,setTitleBold]=useState(true);
  const[satData,setSatData]=useState(null);
  const[satErr,setSatErr]=useState('');
  const ref=useRef(null);

  useEffect(()=>{setSatData(null);setSatErr('');
    fetch(`${API}/api/ref-saturation/${encodeURIComponent(refName)}`).then(r=>{if(!r.ok)throw new Error('API 오류');return r.json()}).then(d=>setSatData(d)).catch(e=>setSatErr(e.message))
  },[refName]);

  const timeIdx=useMemo(()=>cases.map(cs=>{const t=cs?.data?.Time_min||cs?.data?.Time_sec||cs?.data?.Time;if(!t||!t.length)return 0;const tgt=t[t.length-1]*timeR;let b=0;for(let i=1;i<t.length;i++){if(Math.abs(t[i]-tgt)<Math.abs(t[b]-tgt))b=i}return b}),[cases,timeR]);
  const curT=cases[0]?.data?.Time_min?.[timeIdx[0]]||cases[0]?.data?.Time_sec?.[timeIdx[0]]||0;

  useEffect(()=>{if(!ref.current||!satData)return;
    const fW=chartW>0?chartW:undefined;
    const s=satData.sat,c=satData.critical;
    const tr=[
      {x:s.hl,y:s.P,mode:'lines',line:{color:'#2563eb',width:2},name:'포화액선',showlegend:false,hoverinfo:'skip'},
      {x:s.hv,y:s.P,mode:'lines',line:{color:'#dc2626',width:2},name:'포화증기선',showlegend:false,hoverinfo:'skip'},
      {x:[c.h],y:[c.P],mode:'markers',marker:{size:12,color:'#1a1a2e',symbol:'diamond',line:{width:2,color:'#fff'}},name:'임계점',showlegend:false,hovertemplate:'<b>임계점</b><br>'+c.P.toFixed(1)+' bar, '+c.T.toFixed(1)+'°C<extra></extra>'}
    ];
    let hasOverlay=false;
    const cycleH=[],cycleP=[];
    cases.forEach((cs,ci)=>{if(!caseVis[cs.name])return;const i=timeIdx[ci];const d=cs.data;if(!d)return;
      if(!d.h_Comp_In_ref?.[i]||!d.P_Comp_In?.[i])return;
      const BA=1.01325;
      const pts=[];
      pts.push({h:d.h_Comp_In_ref[i],P:d.P_Comp_In[i]+BA,lb:'①'});
      if(d.h_Comp_Out_ref?.[i]!=null&&d.P_Comp_Out?.[i]!=null)pts.push({h:d.h_Comp_Out_ref[i],P:d.P_Comp_Out[i]+BA,lb:'②'});
      if(d.h_Cond_Out_ref?.[i]!=null)pts.push({h:d.h_Cond_Out_ref[i],P:(d.P_Comp_Out?.[i]||d.P_Comp_In[i])+BA,lb:'③'});
      if(d.h_Eva_In_ref?.[i]!=null)pts.push({h:d.h_Eva_In_ref[i],P:d.P_Comp_In[i]+BA,lb:'④'});
      pts.forEach(p=>{cycleH.push(p.h);cycleP.push(p.P)});
      if(pts.length>1){pts.push(pts[0]);hasOverlay=true;
        tr.push({x:pts.map(p=>p.h),y:pts.map(p=>p.P),mode:'lines+markers+text',text:pts.map(p=>p.lb),textposition:'top center',textfont:{size:12,color:(caseColors?.[cs.name]||VW_COLORS[ci%VW_COLORS.length]),family:'var(--font)'},marker:{size:12,line:{width:1,color:'#fff'}},line:{color:(caseColors?.[cs.name]||VW_COLORS[ci%VW_COLORS.length]),width:Math.max(lw,2.5)},name:cs.label||cs.name,hovertemplate:'h=%{x:.1f} kJ/kg<br>P=%{y:.2f} bar<extra></extra>'})}
    });
    // 축 범위
    let hRange,pRange;
    if(cycleH.length>0){
      const hPad=Math.max((Math.max(...cycleH)-Math.min(...cycleH))*.25,20);
      const pMin=Math.min(...cycleP),pMax=Math.max(...cycleP);
      const calcH=[Math.min(...cycleH)-hPad,Math.max(...cycleH)+hPad];
      const calcP=[Math.log10(Math.max(.3,pMin*.6)),Math.log10(pMax*1.4)];
      if(!fixedRange)setFixedRange({h:calcH,p:calcP});
      if(autoFit){hRange=calcH;pRange=calcP}
      else if(fixedRange){hRange=fixedRange.h;pRange=fixedRange.p}
      else{hRange=calcH;pRange=calcP}
    }else{
      hRange=[Math.min(...s.hl)*.8,Math.max(...s.hv)*1.05];
      pRange=[Math.log10(.5),Math.log10(c.P*1.15)];
    }
    const fontMap={sans:'system-ui,-apple-system,"Segoe UI",Roboto,sans-serif',mono:'ui-monospace,"SF Mono",Consolas,monospace',serif:'Georgia,"Times New Roman",serif'};
    const ff=fontMap[fontFamily]||fontMap.sans;
    const tFont={size:titleFontSize,family:ff,...(titleBold?{weight:700}:{})};
    const tkFont={size:tickFontSize,family:ff};
    const lgFont={size:legendFontSize,family:ff};
    const wB=s=>titleBold?'<b>'+s+'</b>':s;
    try{Plotly.react(ref.current,tr,{
      title:{text:'<b>P-h 선도</b> — '+satData.coolprop_name+(hasOverlay?' (t='+curT.toFixed(1)+' min)':''),font:{size:14,family:ff},y:.98,yanchor:'top'},
      xaxis:{title:{text:wB('엔탈피 [kJ/kg]'),font:tFont},range:hRange,gridcolor:'rgba(0,0,0,0.08)',linecolor:'rgba(0,0,0,0.2)',linewidth:1,mirror:true,zeroline:false,tickfont:tkFont},
      yaxis:{title:{text:wB('압력 [bar abs]'),font:tFont},type:'log',range:pRange,gridcolor:'rgba(0,0,0,0.08)',linecolor:'rgba(0,0,0,0.2)',linewidth:1,mirror:true,zeroline:false,dtick:.30103,tickfont:tkFont},
      height:chartH,width:fW,margin:{t:60,b:60,l:80,r:30},
      paper_bgcolor:'rgba(255,255,255,0)',plot_bgcolor:'#ffffff',
      font:{family:ff,color:'#3a3a4e',size:tickFontSize},
      legend:{orientation:'h',y:-.15,x:.5,xanchor:'center',font:lgFont,bgcolor:'rgba(255,255,255,0.8)'},
      hovermode:'closest',dragmode:dragMode==='pan'?'pan':'zoom'
    },{responsive:!fW,displaylogo:false,scrollZoom:true})}catch(e){console.error('VwPh:',e)}
  },[satData,cases,caseVis,caseColors,timeIdx,lw,chartH,chartW,dragMode,curT,autoFit,fontFamily,titleFontSize,tickFontSize,legendFontSize,titleBold]);

  const stPts=useMemo(()=>cases.map((cs,ci)=>{if(!caseVis[cs.name])return null;const i=timeIdx[ci];const d=cs.data;if(!d?.h_Comp_In_ref?.[i]||!d?.P_Comp_In?.[i])return null;const BA=1.01325;
    const pts=[];
    pts.push({lb:'①압축기입구',P:d.P_Comp_In[i]+BA,h:d.h_Comp_In_ref[i],T:d.T_Comp_In?.[i]});
    if(d.h_Comp_Out_ref?.[i]!=null)pts.push({lb:'②압축기출구',P:(d.P_Comp_Out?.[i]||0)+BA,h:d.h_Comp_Out_ref[i],T:d.T_Comp_Out?.[i]});
    if(d.h_Cond_Out_ref?.[i]!=null)pts.push({lb:'③응축기출구',P:(d.P_Comp_Out?.[i]||0)+BA,h:d.h_Cond_Out_ref[i],T:d.T_Cond_Out?.[i]});
    if(d.h_Eva_In_ref?.[i]!=null)pts.push({lb:'④팽창밸브출구',P:d.P_Comp_In[i]+BA,h:d.h_Eva_In_ref[i],T:d.T_Eva_Out?.[i]});
    return pts.length?{name:cs.label||cs.name,color:(caseColors?.[cs.name]||VW_COLORS[ci%VW_COLORS.length]),pts}:null;
  }).filter(Boolean),[cases,caseVis,timeIdx]);

  return(<div style={{display:'grid',gridTemplateColumns:'280px 1fr',gap:10,alignItems:'start'}}>
    {/* ═══ 사이드바 ═══ */}
    <div style={{display:'flex',flexDirection:'column',gap:8,position:'sticky',top:8,alignSelf:'start',maxHeight:'calc(100vh - 20px)',overflowY:'auto',overflowX:'hidden',paddingRight:6,scrollbarGutter:'stable'}}>
      <div style={{padding:'6px 10px',background:'var(--bg3)',border:'1px solid var(--bd)',borderRadius:8,fontSize:11}}>
        <div style={{fontWeight:600,color:'var(--tx2)',fontSize:10,marginBottom:5}}>냉매</div>
        <select value={refName} onChange={e=>setRefName(e.target.value)} style={{width:'100%',fontSize:11}}>
          <option value="R290">R290 (Propane)</option><option value="R134a">R134a</option>
          <option value="R32">R32</option><option value="R410A">R410A</option>
          <option value="R1234yf">R1234yf</option>
        </select>
        {satData&&<div style={{fontSize:10,color:'var(--tx3)',marginTop:4,fontFamily:'var(--mono)'}}>Tc={satData.critical.T.toFixed(1)}°C<br/>Pc={satData.critical.P.toFixed(1)}bar</div>}
        {satErr&&<div style={{fontSize:10,color:'var(--red)',marginTop:4}}>{satErr}</div>}
      </div>
      <div style={{padding:'6px 10px',background:'var(--bg3)',border:'1px solid var(--bd)',borderRadius:8,fontSize:11}}>
        <div style={{fontWeight:600,color:'var(--tx2)',fontSize:10,marginBottom:5}}>시점</div>
        <input type="range" min="0" max="1" step=".005" value={timeR} onChange={e=>setTimeR(+e.target.value)} style={{width:'100%'}}/>
        <div style={{fontFamily:'var(--mono)',fontSize:12,color:'var(--teal)',textAlign:'center',marginTop:4}}>{curT.toFixed(1)} min</div>
      </div>
      <div style={{padding:'6px 10px',background:'var(--bg3)',border:'1px solid var(--bd)',borderRadius:8,fontSize:11}}>
        <div style={{fontWeight:600,color:'var(--tx2)',fontSize:10,marginBottom:5}}>축 범위</div>
        <button className={`bt bs ${autoFit?'on':''}`} onClick={()=>setAutoFit(!autoFit)} style={autoFit?{background:'var(--teal)',borderColor:'var(--teal)',color:'#fff',fontSize:10,width:'100%'}:{fontSize:10,width:'100%'}}>{autoFit?'📐 Auto Fit':'📌 고정'}</button>
        {!autoFit&&<button className="bt bs" onClick={()=>{setFixedRange(null);setAutoFit(true)}} style={{fontSize:10,width:'100%',marginTop:4}}>↺ 리셋</button>}
      </div>
      <div style={{padding:'6px 10px',background:'var(--bg3)',border:'1px solid var(--bd)',borderRadius:8,fontSize:11}}>
        <div style={{fontWeight:600,color:'var(--tx2)',fontSize:10,marginBottom:5}}>글꼴</div>
        <div style={{display:'flex',gap:4,alignItems:'center',marginBottom:5}}>
          <select value={fontFamily} onChange={e=>setFontFamily(e.target.value)} style={{flex:1,fontSize:10,padding:'2px 4px'}}>
            <option value="sans">Sans</option><option value="mono">Mono</option><option value="serif">Serif</option>
          </select>
          <label style={{fontSize:10,color:'var(--tx3)',cursor:'pointer',display:'flex',alignItems:'center',gap:3}}><input type="checkbox" checked={titleBold} onChange={e=>setTitleBold(e.target.checked)} style={{accentColor:'var(--teal)'}}/>Bold</label>
        </div>
        <div style={{display:'flex',gap:4,alignItems:'center',marginBottom:4}}>
          <span style={{color:'var(--tx3)',fontSize:10,minWidth:28}}>제목</span>
          <input type="number" min="6" max="32" value={titleFontSize} onChange={e=>setTitleFontSize(+e.target.value||12)} style={{width:44,fontSize:10,padding:'1px 3px'}}/>
          <span style={{color:'var(--tx3)',fontSize:10,minWidth:28,marginLeft:4}}>눈금</span>
          <input type="number" min="6" max="32" value={tickFontSize} onChange={e=>setTickFontSize(+e.target.value||10)} style={{width:44,fontSize:10,padding:'1px 3px'}}/>
        </div>
        <div style={{display:'flex',gap:4,alignItems:'center'}}>
          <span style={{color:'var(--tx3)',fontSize:10,minWidth:28}}>레전드</span>
          <input type="number" min="6" max="32" value={legendFontSize} onChange={e=>setLegendFontSize(+e.target.value||11)} style={{width:44,fontSize:10,padding:'1px 3px'}}/>
        </div>

      <div style={{padding:'6px 10px',background:'var(--bg3)',border:'1px solid var(--bd)',borderRadius:8,fontSize:11}}>
        <div style={{fontWeight:600,color:'var(--tx2)',fontSize:10,marginBottom:5}}>차트 스타일</div>
        <div style={{display:'flex',gap:4,alignItems:'center',marginBottom:4}}>

        </div>

          <span style={{color:'var(--tx3)',fontSize:10,minWidth:40}}>높이</span>
          <input type="range" min="300" max="1600" step="10" value={chartH} onChange={e=>setChartH?.(+e.target.value)} style={{flex:1,minWidth:0}}/>
          <span style={{fontFamily:'var(--mono)',color:'var(--tx3)',fontSize:10,minWidth:40,textAlign:'right'}}>{chartH}px</span>

        </div>

        </div>
      </div>
    </div>
    {/* ═══ 메인 ═══ */}
    <div style={{minWidth:0}}>
      {!hasRefData&&<div style={{padding:12,margin:'0 0 10px',background:'rgba(245,158,11,.08)',border:'1px solid rgba(245,158,11,.2)',borderRadius:8,fontSize:12,color:'var(--amber)'}}>
        ⚠️ P-h 선도: T_Comp_In + P_Comp_In이 있으면 서버에서 엔탈피를 자동 계산합니다.
      </div>}
      <div className="cd" style={{overflowX:'auto',padding:4}}>{satData?<div ref={ref}/>:<div className="it" style={{padding:30,textAlign:'center'}}>{satErr||'포화선 데이터 로딩 중...'}</div>}</div>
      {stPts.length>0&&<div className="cd" style={{marginTop:10}}>
        <div className="ct">냉매 상태점 — {refName} @ t={curT.toFixed(1)} min</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(240px,1fr))',gap:10}}>
        {stPts.map(sp=><div key={sp.name} style={{background:'var(--bg3,#1a1a25)',border:'1px solid var(--bd2)',borderRadius:8,padding:10}}>
          <div style={{fontSize:12,fontWeight:500,marginBottom:6,display:'flex',alignItems:'center',gap:5}}><span style={{width:8,height:8,borderRadius:'50%',background:sp.color}}/>{sp.name}</div>
          {sp.pts.map(p=><div key={p.lb} style={{marginBottom:4}}>
            <div style={{fontSize:11,color:'var(--teal)',marginBottom:2}}>{p.lb}</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:2,fontSize:11}}>
              <span>P: <b>{p.P.toFixed(2)} bar</b></span><span>h: <b>{p.h?.toFixed(1)} kJ/kg</b></span>
              {p.T!=null&&<span>T: <b>{p.T.toFixed(1)} °C</b></span>}
            </div>
          </div>)}
        </div>)}
        </div>
      </div>}
    </div>
  </div>)
}
