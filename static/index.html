function PerfChart({cases,caseVis,caseColors,chartH,chartW,defaultVars,defaultY1,id,globalFont}){
  const VW_COLORS=['#2563eb','#dc2626','#16a34a','#f59e0b','#8b5cf6','#06b6d4','#ec4899','#84cc16'];
  const BAR_COLORS=['#3b82f6','#ef4444','#22c55e','#f59e0b','#8b5cf6','#06b6d4','#ec4899','#84cc16','#f97316','#14b8a6'];
  const ref=useRef();
  const[vars,setVars]=useState(defaultVars);
  const[grouped,setGrouped]=useState(true);
  const[xLabel,setXLabel]=useState('Case');
  const[y1Label,setY1Label]=useState(defaultY1);
  const[y2Label,setY2Label]=useState('');
  const[y1Range,setY1Range]=useState(['','']);
  const[y2Range,setY2Range]=useState(['','']);
  const[axisFontSize,setAxisFontSize]=useState(12);
  const[axisBold,setAxisBold]=useState(true);
  const[showDataLabels,setShowDataLabels]=useState(true);
  const[dataLabelSize,setDataLabelSize]=useState(9);
  const[dataLabelBold,setDataLabelBold]=useState(false);
  const[y1Grid,setY1Grid]=useState(true);
  const[y2Grid,setY2Grid]=useState(false);
  const[barWidth,setBarWidth]=useState(0.8);
  const[open,setOpen]=useState(false);

  const availKeys=useMemo(()=>{const s=new Set();cases.forEach(c=>{if(c?.data)Object.keys(c.data).forEach(k=>s.add(k))});return[...s].sort((a,b)=>{const la=VL[a]||a,lb=VL[b]||b;return la.localeCompare(lb,'ko')})},[cases]);
  const getLabel=k=>{const p=PERF_PRESETS.find(x=>x.key===k);return p?p.label:k};
  const getSummary=(d,key,agg)=>{const a=d?.[key];if(!a?.length)return null;const v=a.filter(x=>x!=null&&!isNaN(x));if(!v.length)return null;if(agg==='last')return v[v.length-1];if(agg==='mean')return v.reduce((a,b)=>a+b,0)/v.length;if(agg==='max')return Math.max(...v);if(agg==='min')return Math.min(...v);return v[v.length-1]};
  const addVar=()=>{const u=availKeys.filter(k=>!vars.some(v=>v.key===k)&&!/^Time_sec/i.test(k));if(!u.length)return;setVars(p=>[...p,{key:u[0],axis:'y1',type:'bar',agg:'last'}])};
  const removeVar=i=>setVars(p=>p.filter((_,j)=>j!==i));
  const updateVar=(i,f,v)=>setVars(p=>p.map((x,j)=>j===i?{...x,[f]:v}:x));
  const moveVar=(i,to)=>{if(to<0||to>=vars.length)return;setVars(p=>{const a=[...p];[a[i],a[to]]=[a[to],a[i]];return a})};

  useEffect(()=>{
    if(!ref.current||!cases.length||!vars.length)return;
    const vc=cases.filter(c=>caseVis[c.name]);if(!vc.length)return;
    const cn=vc.map(c=>c.label||c.name);const traces=[];
    const bv=vars.filter(v=>v.type==='bar'),lv=vars.filter(v=>v.type==='line');
    const dl={size:dataLabelSize,weight:dataLabelBold?'bold':'normal'};
    const mt=vals=>showDataLabels?vals.map(x=>x!=null?x.toFixed(2):''):[];
    if(grouped){bv.forEach((v,vi)=>{const vals=vc.map(c=>getSummary(c.data,v.key,v.agg));traces.push({x:cn,y:vals,name:getLabel(v.key),type:'bar',yaxis:v.axis==='y2'?'y2':'y',marker:{color:BAR_COLORS[vi%BAR_COLORS.length],line:{width:1,color:'rgba(0,0,0,.15)'}},text:mt(vals),textposition:'outside',textfont:dl})})}
    else{const bl=bv.map(v=>getLabel(v.key));vc.forEach((c,ci)=>{const col=caseColors[c.name]||VW_COLORS[ci%VW_COLORS.length];const vals=bv.map(v=>getSummary(c.data,v.key,v.agg));traces.push({x:bl,y:vals,name:c.label||c.name,type:'bar',marker:{color:col,line:{width:1,color:'rgba(0,0,0,.15)'}},text:mt(vals),textposition:'outside',textfont:dl,legendgroup:c.name})})}
    lv.forEach((v,vi)=>{const vals=vc.map(c=>getSummary(c.data,v.key,v.agg));traces.push({x:cn,y:vals,name:getLabel(v.key),type:'scatter',mode:showDataLabels?'lines+markers+text':'lines+markers',yaxis:v.axis==='y2'?'y2':'y',line:{width:2.5,shape:'spline',color:BAR_COLORS[(bv.length+vi)%BAR_COLORS.length]},marker:{size:10,line:{width:2,color:'#fff'}},text:mt(vals),textposition:'top center',textfont:dl})});
    const fW=chartW>0?chartW:undefined;
    const gf=globalFont||{};
    const fontMap={sans:'system-ui,-apple-system,"Segoe UI",Roboto,sans-serif',mono:'ui-monospace,"SF Mono",Consolas,monospace',serif:'Georgia,"Times New Roman",serif'};
    const ff=fontMap[gf.fontFamily]||fontMap.sans;
    const tSize=gf.titleFontSize??axisFontSize;
    const tkSize=gf.tickFontSize??axisFontSize;
    const lgSize=gf.legendFontSize??11;
    const tBold=gf.titleBold??axisBold;
    const af={size:tSize,family:ff,...(tBold?{weight:700}:{})};
    const at=t=>({text:tBold?'<b>'+t+'</b>':t,font:af});
    const g1=y1Grid?'rgba(0,0,0,0.08)':'rgba(0,0,0,0)';const g2=y2Grid?'rgba(0,0,0,0.08)':'rgba(0,0,0,0)';
    const r1=y1Range[0]!==''&&y1Range[1]!==''?[+y1Range[0],+y1Range[1]]:undefined;
    const r2=y2Range[0]!==''&&y2Range[1]!==''?[+y2Range[0],+y2Range[1]]:undefined;
    const lo={width:fW,height:chartH||400,margin:{l:70,r:70,t:30,b:60},barmode:'group',bargap:1-barWidth,bargroupgap:0.1,paper_bgcolor:'rgba(0,0,0,0)',plot_bgcolor:'rgba(0,0,0,0)',font:{family:ff,size:tkSize},xaxis:{title:xLabel?at(xLabel):undefined,tickfont:{size:tkSize,family:ff},linecolor:'rgba(0,0,0,0.2)',linewidth:1},yaxis:{title:at(y1Label||'Y축'),tickfont:{size:tkSize,family:ff},range:r1,gridcolor:g1,linecolor:'rgba(0,0,0,0.2)',linewidth:1,zeroline:false},legend:{orientation:'h',y:-.22,x:.5,xanchor:'center',font:{size:lgSize,family:ff},bgcolor:'rgba(255,255,255,.8)'}};
    if(vars.some(v=>v.axis==='y2'))lo.yaxis2={title:at(y2Label||'우측 Y축'),tickfont:{size:tkSize,family:ff},range:r2,overlaying:'y',side:'right',gridcolor:g2,linecolor:'rgba(0,0,0,0.2)',linewidth:1,zeroline:false};
    try{Plotly.react(ref.current,traces,lo,{responsive:!fW,displaylogo:false})}catch(e){console.error('PerfChart:',e)}
  },[cases,caseVis,caseColors,vars,grouped,chartH,chartW,xLabel,y1Label,y2Label,y1Range,y2Range,axisFontSize,axisBold,showDataLabels,dataLabelSize,dataLabelBold,y1Grid,y2Grid,barWidth,globalFont?.fontFamily,globalFont?.titleFontSize,globalFont?.tickFontSize,globalFont?.legendFontSize,globalFont?.titleBold]);

  return(<div style={{marginBottom:12}}>
    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
      <span style={{fontWeight:600,fontSize:11,color:'var(--tx)'}}>{y1Label||defaultY1}</span>
      <button className="bt bs" onClick={()=>setOpen(p=>!p)} style={{fontSize:9,padding:'2px 8px'}}>{open?'설정 접기':'설정 펼치기'}</button>
    </div>
    {open&&<div style={{padding:'6px 10px',background:'var(--bg3)',border:'1px solid var(--bd)',borderRadius:8,marginBottom:6}}>
      <div style={{display:'flex',gap:6,flexWrap:'wrap',alignItems:'center',fontSize:10,marginBottom:4}}>
        <button className="bt bs" onClick={addVar} style={{fontSize:9,padding:'2px 6px'}}>+ 추가</button>
        <label style={{display:'flex',alignItems:'center',gap:3,cursor:'pointer'}}><input type="checkbox" checked={grouped} onChange={e=>setGrouped(e.target.checked)} style={{accentColor:'var(--teal)'}}/>그룹화</label>
        <span style={{width:1,height:12,background:'var(--bd2)'}}/>
        <span style={{color:'var(--tx3)'}}>X:</span><input value={xLabel} onChange={e=>setXLabel(e.target.value)} style={{width:60,fontSize:10,padding:'1px 3px',background:'var(--bg)',border:'1px solid var(--bd2)',borderRadius:3}}/>
        <span style={{color:'var(--tx3)'}}>좌Y:</span><input value={y1Label} onChange={e=>setY1Label(e.target.value)} style={{width:80,fontSize:10,padding:'1px 3px',background:'var(--bg)',border:'1px solid var(--bd2)',borderRadius:3}}/>
        <span style={{color:'var(--tx3)'}}>우Y:</span><input value={y2Label} onChange={e=>setY2Label(e.target.value)} placeholder="자동" style={{width:60,fontSize:10,padding:'1px 3px',background:'var(--bg)',border:'1px solid var(--bd2)',borderRadius:3}}/>
        <span style={{width:1,height:12,background:'var(--bd2)'}}/>
        <span style={{color:'var(--tx3)'}}>좌범위:</span><input value={y1Range[0]} onChange={e=>setY1Range(p=>[e.target.value,p[1]])} placeholder="min" style={{width:35,fontSize:10,padding:'1px 3px',textAlign:'center',background:'var(--bg)',border:'1px solid var(--bd2)',borderRadius:3}}/>~<input value={y1Range[1]} onChange={e=>setY1Range(p=>[p[0],e.target.value])} placeholder="max" style={{width:35,fontSize:10,padding:'1px 3px',textAlign:'center',background:'var(--bg)',border:'1px solid var(--bd2)',borderRadius:3}}/>
        <span style={{width:1,height:12,background:'var(--bd2)'}}/>
        <span style={{color:'var(--tx3)'}}>글꼴:</span><input type="number" value={axisFontSize} onChange={e=>setAxisFontSize(+e.target.value)} min={1} style={{width:30,fontSize:10,padding:'1px 2px',textAlign:'center',background:'var(--bg)',border:'1px solid var(--bd2)',borderRadius:3}}/>
        <label style={{display:'flex',alignItems:'center',gap:2,cursor:'pointer'}}><input type="checkbox" checked={axisBold} onChange={e=>setAxisBold(e.target.checked)} style={{accentColor:'var(--teal)'}}/>B</label>
        <label style={{display:'flex',alignItems:'center',gap:2,cursor:'pointer'}}><input type="checkbox" checked={showDataLabels} onChange={e=>setShowDataLabels(e.target.checked)} style={{accentColor:'var(--teal)'}}/>수치</label>
        <input type="number" value={dataLabelSize} onChange={e=>setDataLabelSize(+e.target.value)} min={1} style={{width:30,fontSize:10,padding:'1px 2px',textAlign:'center',background:'var(--bg)',border:'1px solid var(--bd2)',borderRadius:3}}/>
        <span style={{width:1,height:12,background:'var(--bd2)'}}/>
        <span style={{color:'var(--tx3)'}}>Grid</span><label style={{display:'flex',alignItems:'center',gap:1,cursor:'pointer'}}><input type="checkbox" checked={y1Grid} onChange={e=>setY1Grid(e.target.checked)} style={{accentColor:'var(--teal)'}}/>좌</label><label style={{display:'flex',alignItems:'center',gap:1,cursor:'pointer'}}><input type="checkbox" checked={y2Grid} onChange={e=>setY2Grid(e.target.checked)} style={{accentColor:'var(--teal)'}}/>우</label>
        <span style={{width:1,height:12,background:'var(--bd2)'}}/>
        <span style={{color:'var(--tx3)'}}>바폭</span><input type="range" min="0.2" max="1" step="0.05" value={barWidth} onChange={e=>setBarWidth(+e.target.value)} style={{width:50}}/><span style={{fontFamily:'var(--mono)',color:'var(--tx3)'}}>{barWidth}</span>
      </div>
      <div style={{maxHeight:120,overflowY:'auto'}}>
        {vars.map((v,i)=>(<div key={i} style={{display:'flex',alignItems:'center',gap:3,padding:'2px 3px',borderBottom:'1px solid var(--bd)',fontSize:10}}>
          <div style={{display:'flex',flexDirection:'column'}}><button onClick={()=>moveVar(i,i-1)} disabled={i===0} style={{fontSize:6,lineHeight:'7px',padding:0,border:0,background:0,color:i===0?'var(--bd2)':'var(--tx3)',cursor:i===0?'default':'pointer'}}>▲</button><button onClick={()=>moveVar(i,i+1)} disabled={i>=vars.length-1} style={{fontSize:6,lineHeight:'7px',padding:0,border:0,background:0,color:i>=vars.length-1?'var(--bd2)':'var(--tx3)',cursor:i>=vars.length-1?'default':'pointer'}}>▼</button></div>
          <select value={v.key} onChange={e=>updateVar(i,'key',e.target.value)} style={{flex:1,fontSize:10,padding:'1px 2px',background:'var(--bg)',border:'1px solid var(--bd2)',borderRadius:3,color:'var(--tx)'}}>{availKeys.map(k=><option key={k} value={k}>{getLabel(k)}</option>)}</select>
          <select value={v.type} onChange={e=>updateVar(i,'type',e.target.value)} style={{fontSize:10,padding:'1px 2px',width:45,background:'var(--bg)',border:'1px solid var(--bd2)',borderRadius:3}}><option value="bar">막대</option><option value="line">선</option></select>
          <select value={v.axis} onChange={e=>updateVar(i,'axis',e.target.value)} style={{fontSize:10,padding:'1px 2px',width:40,background:'var(--bg)',border:'1px solid var(--bd2)',borderRadius:3}}><option value="y1">좌</option><option value="y2">우</option></select>
          <select value={v.agg} onChange={e=>updateVar(i,'agg',e.target.value)} style={{fontSize:10,padding:'1px 2px',width:45,background:'var(--bg)',border:'1px solid var(--bd2)',borderRadius:3}}><option value="last">최종</option><option value="mean">평균</option><option value="max">최대</option><option value="min">최소</option></select>
          <button onClick={()=>removeVar(i)} style={{fontSize:9,border:0,background:0,color:'var(--red)',cursor:'pointer',padding:0}}>×</button>
        </div>))}
      </div>
    </div>}
    <div className="cd" style={{padding:4}}><div ref={ref}/></div>
  </div>)
}

        defaultY1="총 소비전력량 [Wh]"/>
      <PerfChart cases={cases} caseVis={caseVis} caseColors={caseColors} chartH={chartH} chartW={chartW} id="rmc" globalFont={globalFont}

function CfgField({lb,p,t='text',o,u,st,cfg,onChange}){
  const k=p.split('.');let v=cfg;for(const x of k)v=v?.[x];
  return(<div className="fr"><div className="fl">{lb}</div><div className="fi">{o?<select value={v||''} onChange={e=>onChange(p,e.target.value)}>{o.map(x=><option key={x}>{x}</option>)}</select>:<input type={t} value={v??''} step={st} onChange={e=>onChange(p,t==='number'?Number(e.target.value):e.target.value)}/>}</div>{u&&<span className="fu">{u}</span>}</div>)
}

function PcCorrectionTable({cfg,setCfg}){
  // 행: Po_WD, Po_Comp, Po_Fan (3개)
  // 열: PC × (weight, bias) — 예: P1_w, P1_b, P2_w, P2_b, ...
  const pcs=cfg?.calculation?.pc_corrections||{};
  const pcKeys=Object.keys(pcs);
  const rows=['Po_WD','Po_Comp','Po_Fan'];
  const rowLabels={Po_WD:'WD',Po_Comp:'Comp',Po_Fan:'Fan'};
  
  // 열 구조: [{pc, field}]
  const colDefs=[];
  pcKeys.forEach(pc=>{colDefs.push({pc,field:'weight'});colDefs.push({pc,field:'bias'})});
  
  const nRows=rows.length, nCols=colDefs.length;
  const [editing,setEditing]=React.useState(null);
  const [editVal,setEditVal]=React.useState('');
  const [sel,setSel]=React.useState(null);
  const [drag,setDrag]=React.useState(null);
  const tableRef=React.useRef(null);
  
  const getVal=(r,c)=>{const row=rows[r];const{pc,field}=colDefs[c];return pcs[pc]?.[row]?.[field]};
  const setVal=(r,c,v)=>{
    const np=JSON.parse(JSON.stringify(pcs));
    const row=rows[r];
    const{pc,field}=colDefs[c];
    if(!np[pc][row])np[pc][row]={weight:1,bias:0};
    np[pc][row][field]=v;
    setCfg('calculation.pc_corrections',np);
  };
  const setMultiVals=(updates)=>{
    const np=JSON.parse(JSON.stringify(pcs));
    updates.forEach(({r,c,v})=>{
      if(r>=nRows||c>=nCols||r<0||c<0)return;
      const row=rows[r];
      const{pc,field}=colDefs[c];
      if(!np[pc][row])np[pc][row]={weight:1,bias:0};
      np[pc][row][field]=v;
    });
    setCfg('calculation.pc_corrections',np);
  };
  
  const normRange=(s)=>s?{r1:Math.min(s.r1,s.r2),r2:Math.max(s.r1,s.r2),c1:Math.min(s.c1,s.c2),c2:Math.max(s.c1,s.c2)}:null;
  const isInSel=(r,c)=>{const n=normRange(sel);if(!n)return false;return r>=n.r1&&r<=n.r2&&c>=n.c1&&c<=n.c2};
  
  const commitEdit=()=>{
    if(!editing)return;
    const v=editVal===''?0:(isNaN(+editVal)?0:+editVal);
    setVal(editing.r,editing.c,v);
    setEditing(null);setEditVal('');
  };
  const cancelEdit=()=>{setEditing(null);setEditVal('')};
  
  const startEdit=(r,c,keepVal=false)=>{
    setEditing({r,c});
    const cur=getVal(r,c);
    setEditVal(keepVal?String(cur??''):'');
    setSel({r1:r,c1:c,r2:r,c2:c});
  };
  
  const onCellMouseDown=(e,r,c)=>{
    if(editing&&(editing.r!==r||editing.c!==c))commitEdit();
    if(e.shiftKey&&sel){setSel({...sel,r2:r,c2:c})}
    else{setSel({r1:r,c1:c,r2:r,c2:c});setDrag({r,c})}
  };
  const onCellMouseEnter=(r,c)=>{if(drag)setSel({r1:drag.r,c1:drag.c,r2:r,c2:c})};
  const onCellDoubleClick=(r,c)=>startEdit(r,c,true);
  
  React.useEffect(()=>{
    const up=()=>setDrag(null);
    window.addEventListener('mouseup',up);
    return()=>window.removeEventListener('mouseup',up);
  },[]);
  
  const onKeyDown=(e)=>{
    if(editing){
      if(e.key==='Enter'){e.preventDefault();commitEdit()}
      else if(e.key==='Escape'){e.preventDefault();cancelEdit()}
      return;
    }
    if(!sel)return;
    const n=normRange(sel);
    
    if((e.ctrlKey||e.metaKey)&&e.key==='c'){
      e.preventDefault();
      const lines=[];
      for(let r=n.r1;r<=n.r2;r++){
        const cells=[];
        for(let c=n.c1;c<=n.c2;c++){cells.push(String(getVal(r,c)??''))}
        lines.push(cells.join('\t'));
      }
      navigator.clipboard.writeText(lines.join('\n'));
      return;
    }
    
    if((e.ctrlKey||e.metaKey)&&e.key==='x'){
      e.preventDefault();
      const lines=[];const updates=[];
      for(let r=n.r1;r<=n.r2;r++){
        const cells=[];
        for(let c=n.c1;c<=n.c2;c++){cells.push(String(getVal(r,c)??''));updates.push({r,c,v:0})}
        lines.push(cells.join('\t'));
      }
      navigator.clipboard.writeText(lines.join('\n'));
      setMultiVals(updates);
      return;
    }
    
    if((e.ctrlKey||e.metaKey)&&e.key==='v'){
      e.preventDefault();
      navigator.clipboard.readText().then(txt=>{
        const lines=txt.replace(/\r/g,'').split('\n').filter(l=>l.length>0);
        const updates=[];
        lines.forEach((line,ri)=>{
          const cells=line.split('\t');
          cells.forEach((cv,ci)=>{
            const r=n.r1+ri, c=n.c1+ci;
            if(r>=nRows||c>=nCols)return;
            const v=cv.trim()===''?0:(isNaN(+cv)?0:+cv);
            updates.push({r,c,v});
          });
        });
        setMultiVals(updates);
        if(lines.length>0){
          const lastCells=lines[lines.length-1].split('\t');
          setSel({r1:n.r1,c1:n.c1,r2:Math.min(n.r1+lines.length-1,nRows-1),c2:Math.min(n.c1+lastCells.length-1,nCols-1)});
        }
      });
      return;
    }
    
    if(e.key==='Delete'||e.key==='Backspace'){
      e.preventDefault();
      const updates=[];
      for(let r=n.r1;r<=n.r2;r++)for(let c=n.c1;c<=n.c2;c++)updates.push({r,c,v:0});
      setMultiVals(updates);
      return;
    }
    
    if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)){
      e.preventDefault();
      let{r1,c1}=sel;
      if(e.key==='ArrowUp')r1=Math.max(0,r1-1);
      else if(e.key==='ArrowDown')r1=Math.min(nRows-1,r1+1);
      else if(e.key==='ArrowLeft')c1=Math.max(0,c1-1);
      else if(e.key==='ArrowRight')c1=Math.min(nCols-1,c1+1);
      if(e.shiftKey){setSel({...sel,r2:r1,c2:c1})}
      else{setSel({r1,c1,r2:r1,c2:c1})}
      return;
    }
    
    if(e.key==='Enter'||e.key==='F2'){
      e.preventDefault();
      startEdit(n.r1,n.c1,true);
      return;
    }
    
    if(/^[0-9.\-]$/.test(e.key)){
      e.preventDefault();
      setEditing({r:n.r1,c:n.c1});
      setEditVal(e.key);
      return;
    }
  };
  
  const delPc=(pc)=>{
    if(!confirm(`${pc} 삭제?`))return;
    const np={...pcs};delete np[pc];
    setCfg('calculation.pc_corrections',np);
  };
  
  if(pcKeys.length===0){
    return(<div style={{padding:12,fontSize:11,color:'var(--tx3)',fontStyle:'italic'}}>+ PC 추가 버튼을 눌러 시작하세요</div>);
  }
  
  // 열 개수: 변수(60px) + PC 개수 × 2(weight, bias)
  const gridTpl=`60px repeat(${nCols}, minmax(60px, 1fr))`;
  
  return(
    <div ref={tableRef} tabIndex={0} onKeyDown={onKeyDown}
         style={{border:'1px solid var(--bd)',borderRadius:8,overflow:'auto',margin:'8px 12px',outline:'none'}}>
      {/* 헤더 1행: PC 이름 (weight+bias 2열을 가로로 병합) */}
      <div style={{display:'grid',gridTemplateColumns:gridTpl,gap:0,padding:'4px 4px',background:'var(--bg3)',fontSize:10,fontWeight:600,color:'var(--tx2)',textAlign:'center',borderBottom:'1px solid var(--bd2)'}}>
        <span></span>
        {pcKeys.map(pc=>(<div key={pc} style={{gridColumn:'span 2',display:'flex',alignItems:'center',justifyContent:'center',gap:3,borderLeft:'1px solid var(--bd2)'}}>
          <span>{pc}</span>
          <button onClick={()=>delPc(pc)} style={{fontSize:9,padding:0,background:'transparent',border:'none',color:'var(--tx3)',cursor:'pointer'}} title="삭제">✕</button>
        </div>))}
      </div>
      {/* 헤더 2행: weight/bias */}
      <div style={{display:'grid',gridTemplateColumns:gridTpl,gap:0,padding:'3px 4px',background:'var(--bg3)',fontSize:9,fontWeight:500,color:'var(--tx3)',textAlign:'center'}}>
        <span>변수</span>
        {colDefs.map((cd,i)=>(<span key={i} style={{borderLeft:i%2===0?'1px solid var(--bd2)':'none'}}>{cd.field}</span>))}
      </div>
      {/* 데이터 행: WD / Comp / Fan */}
      {rows.map((row,ri)=>(<div key={ri} style={{display:'grid',gridTemplateColumns:gridTpl,gap:0,padding:'0 4px',borderTop:'1px solid var(--bd)',alignItems:'stretch',fontSize:11,background:ri%2===0?'var(--bg2)':'var(--bg)'}}>
        <span style={{fontWeight:500,textAlign:'center',display:'flex',alignItems:'center',justifyContent:'center',borderRight:'1px solid var(--bd)',padding:'3px 0'}}>{rowLabels[row]}</span>
        {colDefs.map((cd,ci)=>{
          const inSel=isInSel(ri,ci);
          const isEdit=editing?.r===ri&&editing?.c===ci;
          const v=getVal(ri,ci);
          const leftBorder=ci%2===0?'1px solid var(--bd2)':'1px solid var(--bd2)';
          const cellStyle={
            padding:'3px',margin:0,
            background:isEdit?'var(--bg)':(inSel?'rgba(20,184,166,.15)':'transparent'),
            border:inSel?'2px solid var(--teal)':'1px solid var(--bd2)',
            borderLeft:inSel?'2px solid var(--teal)':leftBorder,
            borderRadius:2,
            fontSize:11,color:'var(--tx)',
            textAlign:'right',cursor:'cell',
            userSelect:'none',
            boxSizing:'border-box',
            width:'100%',height:'100%',
          };
          if(isEdit){
            return(<input key={ci} autoFocus type="text" value={editVal}
              onChange={e=>setEditVal(e.target.value)}
              onBlur={commitEdit}
              onKeyDown={e=>{
                e.stopPropagation();
                if(e.key==='Enter'){e.preventDefault();commitEdit()}
                else if(e.key==='Escape'){e.preventDefault();cancelEdit()}
              }}
              style={{...cellStyle,fontFamily:'var(--mono)'}}/>);
          }
          return(<div key={ci}
            onMouseDown={e=>onCellMouseDown(e,ri,ci)}
            onMouseEnter={()=>onCellMouseEnter(ri,ci)}
            onDoubleClick={()=>onCellDoubleClick(ri,ci)}
            style={{...cellStyle,fontFamily:'var(--mono)',display:'flex',alignItems:'center',justifyContent:'flex-end',paddingRight:6}}>
            {v??''}
          </div>);
        })}
      </div>))}
    </div>
  );
}

function RefrigerantField({cfg,onChange}){
  const cur=cfg?.environment?.refrigerant||'R290';
  const presets=['R290','R134a'];
  const isPreset=presets.includes(cur);
  const[mode,setMode]=useState(isPreset?'preset':'custom');
  const[custom,setCustom]=useState(isPreset?'':cur);
  const[vResult,setVResult]=useState(null);
  const[checking,setChecking]=useState(false);

  const selectPreset=v=>{onChange('environment.refrigerant',v);setMode('preset');setCustom('');setVResult(null)};
  const clickCustom=()=>{setMode('custom');setVResult(null)};
  const applyCustom=async()=>{
    if(!custom.trim())return;
    setChecking(true);setVResult(null);
    try{
      const be=cfg?.environment?.backend||'HEOS';
      const r=await fetch(`${API}/api/validate-refrigerant/${encodeURIComponent(custom.trim())}?backend=${be}`);
      const txt=await r.text();
      let d;
      try{d=JSON.parse(txt)}catch{d={valid:false,input:custom.trim(),error:txt}}
      setVResult(d);
      if(d.valid){onChange('environment.refrigerant',custom.trim())}
      else{alert(`냉매 "${custom.trim()}" 를 찾을 수 없습니다.\n\nCoolProp 오류: ${d.error}\n\n올바른 냉매명을 입력하세요. (예: R32, R410A, R1234yf)`)}
    }catch(e){alert('검증 실패: '+e.message)}
    setChecking(false);
  };

  return(<div className="fr" style={{alignItems:'flex-start'}}>
    <div className="fl" style={{paddingTop:8}}>냉매</div>
    <div className="fi" style={{display:'flex',flexDirection:'column',gap:6}}>
      <div style={{display:'flex',gap:6,alignItems:'center'}}>
        {presets.map(p=><button key={p} className={`bt bs ${mode==='preset'&&cur===p?'bp':''}`} onClick={()=>selectPreset(p)} style={{minWidth:60}}>{p}</button>)}
        <button className={`bt bs ${mode==='custom'?'bp':''}`} onClick={clickCustom}>직접 입력</button>
      </div>
      {mode==='custom'&&<div style={{display:'flex',gap:6,alignItems:'center'}}>
        <input value={custom} onChange={e=>{setCustom(e.target.value);setVResult(null)}} placeholder="냉매명 입력 (예: R32, R410A)" style={{flex:1}} onKeyDown={e=>e.key==='Enter'&&applyCustom()}/>
        <button className="bt bs bp" onClick={applyCustom} disabled={checking}>{checking?'검증 중...':'적용'}</button>
      </div>}
      {vResult&&vResult.valid&&<div style={{fontSize:11,color:'var(--green,#16a34a)',display:'flex',gap:8}}>
        <span>✓ {vResult.input}{vResult.input!==vResult.coolprop_name?` → ${vResult.coolprop_name}`:''}</span>
        <span style={{color:'var(--tx2,#9a9890)'}}>Tc={vResult.Tc}°C, Pc={vResult.Pc}bar</span>
      </div>}
    </div>
  </div>)
}

      <input value={(rule.extensions||[]).join(', ')} onChange={e=>setRule('extensions',e.target.value.split(',').map(s=>s.trim()).filter(Boolean))} placeholder=".csv, .tsv, .xls" style={{fontSize:11,padding:'3px 6px'}}/>
      <span style={{color:'var(--tx2)'}}>포함 패턴</span>
      <input value={(rule.include_patterns||[]).join(', ')} onChange={e=>setRule('include_patterns',e.target.value.split(',').map(s=>s.trim()).filter(Boolean))} placeholder="_ams, _nidaq (비어있으면 모든 파일)" style={{fontSize:11,padding:'3px 6px'}}/>
      <span style={{color:'var(--tx2)'}}>제외 패턴</span>
      <input value={(rule.exclude_patterns||[]).join(', ')} onChange={e=>setRule('exclude_patterns',e.target.value.split(',').map(s=>s.trim()).filter(Boolean))} placeholder="비어있으면 제외 없음" style={{fontSize:11,padding:'3px 6px'}}/>
      <span style={{color:'var(--tx2)'}}>스킵 행</span>
      <input type="number" value={rule.skip_rows??0} onChange={e=>setRule('skip_rows',+e.target.value)} min={0} style={{fontSize:11,padding:'3px 6px',width:60}}/>
      <span style={{color:'var(--tx2)'}}>인코딩</span>
      <input value={rule.encoding||''} onChange={e=>setRule('encoding',e.target.value)} placeholder="cp949, utf-8 (비어있으면 자동)" style={{fontSize:11,padding:'3px 6px'}}/>
    </div>
  </div>})}
</div>
</div><div>
<div className="cd"><div className="ct">후처리 필터</div><CfgField lb="LPF τ" p="filtering.lpf_tau" t="number" st="0.1" {...fp}/><CfgField lb="노이즈 윈도우" p="filtering.noise_window" t="number" {...fp}/><CfgField lb="노이즈 임계값" p="filtering.noise_threshold" t="number" st="0.1" {...fp}/><CfgField lb="최소 Hz" p="filtering.min_hz" t="number" u="Hz" {...fp}/><CfgField lb="종료 탐색" p="filtering.last_min" t="number" st="0.5" u="분" {...fp}/></div>
<div className="cd"><div className="ct">압축기 / 체적효율</div>
<CfgField lb="행정체적" p="calculation.compressor_volume_cc" t="number" st="0.1" u="cc" {...fp}/>
<div className="fr"><div className="fl">체적효율 방식</div><div className="fi"><select value={l?.calculation?.volumetric_efficiency?.method||'calculated'} onChange={e=>{
  const m=e.target.value;const ve=JSON.parse(JSON.stringify(l?.calculation?.volumetric_efficiency||{method:'calculated',clearance_volume_ratio:0.03,fixed_value:0.85}));ve.method=m;s('calculation.volumetric_efficiency',ve);
}} style={{fontSize:12}}><option value="calculated">계산 (클리어런스 기반)</option><option value="fixed">고정값</option></select></div></div>
{(l?.calculation?.volumetric_efficiency?.method||'calculated')==='calculated'?
<div className="fr"><div className="fl">클리어런스 체적비</div><div className="fi"><input type="number" value={l?.calculation?.volumetric_efficiency?.clearance_volume_ratio??0.03} onChange={e=>{const ve={...l.calculation.volumetric_efficiency,clearance_volume_ratio:+e.target.value};s('calculation.volumetric_efficiency',ve)}} step="0.005" style={{fontSize:12}}/></div><span className="fu">C_v (0.02~0.05)</span></div>
:<div className="fr"><div className="fl">고정 체적효율</div><div className="fi"><input type="number" value={l?.calculation?.volumetric_efficiency?.fixed_value??0.85} onChange={e=>{const ve={...l.calculation.volumetric_efficiency,fixed_value:+e.target.value};s('calculation.volumetric_efficiency',ve)}} step="0.01" style={{fontSize:12}}/></div><span className="fu">η_vol (0~1)</span></div>}
<div style={{fontSize:9,color:'var(--tx3)',padding:'4px 12px'}}>계산: η_vol = 1 - C_v × (PR^(1/κ) - 1) | 고정: η_vol = 입력값 (전 구간 동일)</div>
</div>
<div className="cd"><div className="ct">PC별 전력 보정 (파일명 자동 감지)</div>
<div style={{fontSize:10,color:'var(--tx3)',marginBottom:6}}>파일명에 _P1_, _P2_ 등이 있으면 해당 PC 설정 자동 적용. 보정식: <b>Po = Po × weight + bias</b><br/>📋 <b>엑셀처럼 사용</b>: 드래그 선택 → Ctrl+C/V/X, Delete로 삭제. 엑셀에서 복사한 Tab 구분 값 붙여넣기 가능.</div>
<div className="fr"><div className="fl">미감지 시 기본</div><div className="fi"><select value={l?.calculation?.selected_pc||'none'} onChange={e=>s('calculation.selected_pc',e.target.value)} style={{fontSize:12}}>
  <option value="none">보정 없음</option>
  {Object.keys(l?.calculation?.pc_corrections||{}).map(pc=><option key={pc} value={pc}>{pc}</option>)}
</select></div></div>
<PcCorrectionTable cfg={l} setCfg={s}/>
<button onClick={()=>{const name=prompt('PC 이름 (예: P4)');if(!name)return;const pcs={...(l?.calculation?.pc_corrections||{})};if(pcs[name]){alert('이미 존재함');return}pcs[name]={Po_WD:{weight:1,bias:0},Po_Comp:{weight:1,bias:0},Po_Fan:{weight:1,bias:0}};s('calculation.pc_corrections',pcs)}} style={{fontSize:11,padding:'4px 10px',margin:'0 12px 8px',background:'var(--teal)',color:'#fff',border:'none',borderRadius:4,cursor:'pointer'}}>+ PC 추가</button>
</div>
<div className="cd"><div className="ct">응축수 초반 튐 방어</div>
<div style={{fontSize:10,color:'var(--tx3)',marginBottom:6}}>워밍업 직후 응축량이 과대 계산되어 IMC 보정 시 전체 값이 0에 수렴하는 문제를 방지합니다.</div>
<CfgField lb="Warm-up 지연" p="calculation.water_warmup.extra_min" t="number" st="0.1" u="분" {...fp}/>
<CfgField lb="압축기 ON Hz" p="calculation.water_warmup.min_comp_hz" t="number" st="0.5" u="Hz" {...fp}/>
<CfgField lb="응축수량 상한" p="calculation.water_warmup.max_gm" t="number" st="1" u="g/min" {...fp}/>
<div style={{fontSize:9,color:'var(--tx3)',padding:'4px 12px'}}>DryMotion≥2 후 N분 + 압축기 Hz≥기준 조건 만족시 응축수 계산 | 상한 0이면 무제한</div>
</div>
<div className="cd"><div className="ct">RH 수렴 계산</div><CfgField lb="증발기 출구 RH" p="calculation.rh_eva_out_assumed" t="number" st="0.01" {...fp}/><CfgField lb="최대 반복" p="calculation.rh_iteration.max_iter" t="number" {...fp}/><CfgField lb="수렴 임계값" p="calculation.rh_iteration.tolerance" t="number" st="0.001" {...fp}/><CfgField lb="감쇠 계수" p="calculation.rh_iteration.damping" t="number" st="0.05" {...fp}/></div>
<div className="cd"><div className="ct">센서 보정 [°C]</div><CfgField lb="T_Cond_In" p="calculation.sensor_offsets.T_Cond_In" t="number" st="0.1" {...fp}/><CfgField lb="T_Cond_Out" p="calculation.sensor_offsets.T_Cond_Out" t="number" st="0.1" {...fp}/><CfgField lb="T_Cond_M1" p="calculation.sensor_offsets.T_Cond_M1" t="number" st="0.1" {...fp}/><CfgField lb="T_Air_Eva_Out" p="calculation.sensor_offsets.T_Air_Eva_Out" t="number" st="0.1" {...fp}/><CfgField lb="T_Comp_In" p="calculation.sensor_offsets.T_Comp_In" t="number" st="0.1" {...fp}/><CfgField lb="T_Comp_Out" p="calculation.sensor_offsets.T_Comp_Out" t="number" st="0.1" {...fp}/></div>
</div></div><div style={{display:'flex',justifyContent:'flex-end',gap:8,marginTop:4}}><button className="bt" onClick={()=>sL(JSON.parse(JSON.stringify(cfg)))}>초기화</button><button className="bt bp" onClick={save} disabled={sv}>{sv?'저장 중...':'설정 저장'}</button></div></div>)}

// ═══ 미리보기 탭 ═══
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
