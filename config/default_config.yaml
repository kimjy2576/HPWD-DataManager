# ================================================================
#  건조기 HP 실험 데이터 통합 분석 프로그램 - 설정 파일
#  Stage 1: 데이터 병합 (merge)
#  Stage 2: 성능 계산 (calc)
# ================================================================

# --- 실험 환경 ---
environment:
  patm: 101.325            # 대기압 [kPa]
  refrigerant: "R290"       # 냉매 (R290 → CoolProp: Propane 자동 변환)
  backend: "HEOS"          # CoolProp 백엔드: "HEOS" | "REFPROP"

# --- Stage 1: 데이터 병합 ---
processing:
  filter_mode: "Dry_Only"
  time_interval: 1
  setup_type: "BR"                     # 실험 소스 타입: "BR" | "MX100"
  data_time: "BR"                      # 시간 동기화 기준 소스
  data_sources: ["BR", "AMS", "MX100", "NIDAQ"] # 사용할 소스 (체크박스)

# --- 파일 식별 규칙 ---
# 각 소스별로 파일을 어떻게 구별할지 정의
# extensions: 확장자 매칭 (소문자)
# include_patterns: 파일명에 포함되어야 하는 문자열 (하나라도 매칭)
# exclude_patterns: 파일명에 포함되면 제외
# skip_rows: 헤더 스킵 행 수
# encoding: 파일 인코딩
file_rules:
  mx100:
    extensions: [".xls", ".xlsx"]
    include_patterns: []
    exclude_patterns: []
    skip_rows: 24
    encoding: ""
  nidaq:
    extensions: [".tsv"]
    include_patterns: []
    exclude_patterns: []
    skip_rows: 0
    encoding: "utf-8"
  ams:
    extensions: [".csv"]
    include_patterns: ["_ams"]
    exclude_patterns: []
    skip_rows: 1
    encoding: "utf-8"
  br:
    extensions: [".csv"]
    include_patterns: []
    exclude_patterns: []
    skip_rows: 1
    encoding: "cp949"

filtering:
  noise_columns: []
  lpf_columns: ["d_currentABS_IqeRef", "T_Air_Eva_Out"]
  lpf_tau: 15
  noise_window: 60
  noise_threshold: 5
  min_hz: 10
  last_min: 2

  # 시작 트림: 특정 변수가 기준값 이상인 첫 시점부터 데이터 사용
  # enabled=false → 기존 방식 (SW_ProtectionCount > 0)
  start_trim:
    enabled: false
    column: "HP_CompTargetHz"
    min_value: 10

spike_removal:
  target_columns: ["Po_WD", "Po_Comp", "Po_Fan"]
  window: 3
  sigma: 2

ftemp:
  k1: 0.3
  k2: 1.45
  k3: 1.0
  auto_delta: 6000
  moving_avg_start_min: 10
  moving_avg_window_min: 5

outlier_thresholds:
  "Po_": [0, 3000]
  "T_":  [-50, 200]
  "P_":  [0, 50]
  "RH_": [0, 100]

mx100:
  useless_columns: [0, 1, 3]

# --- Stage 2: 성능 계산 ---
calculation:
  enabled: true
  compressor_volume_cc: 7.5       # 압축기 행정체적 [cc]
  volumetric_efficiency:
    method: "calculated"          # "calculated" (클리어런스 기반) | "fixed" (고정값)
    clearance_volume_ratio: 0.03  # calculated 모드: C_v (dead volume ratio, 보통 0.02~0.05)
    fixed_value: 0.85             # fixed 모드: 고정 체적효율 [-]
  rh_eva_out_assumed: 0.80        # 증발기 출구 예측 RH [-] (초기값)
  use_imc_correction: true       # IMC/FMC 기반 유량 보정 (true: IMC 입력 시 보정, false: 비보정만)

  # 응축수 초반 튐 방어
  water_warmup:
    extra_min: 1.5          # Ctrl_DryMotion>=2 시점 + N분 이후부터 응축 계산
    min_comp_hz: 1.0        # 압축기 ON 판정 Hz (이 값 이상이면 응축 계산)
    max_gm: 0               # 응축수량 상한 [g/min] (0이면 무제한)

  # RMC 후처리 스무딩 (기본 OFF — 켜면 커브 개형이 왜곡됨)
  rmc_smoothing:
    enabled: false          # true면 이동평균 적용
    window: 15              # 이동평균 창 크기 [샘플]
    monotonic: false        # true면 단조증가 강제 + 최종값 클리핑 (꼬리 평탄화 발생)

  # RH 미측정 시 수렴 반복 설정
  rh_iteration:
    max_iter: 15                   # 최대 반복 횟수
    tolerance: 0.005               # RH 수렴 임계값 [-]
    damping: 0.4                   # 감쇠 계수 (0.2~0.6, 높을수록 빠르지만 불안정)

  # 센서 오프셋 보정 [°C] — 센서별로 적용 (0이면 보정 없음)
  sensor_offsets:
    T_Cond_In: -2.0
    T_Cond_Out: -2.0
    T_Cond_M1: -2.0
    T_Air_Eva_Out: -2.0
    T_Comp_In: -2.0
    T_Comp_Out: -2.0

  # PC별 전력 보정: Po_corrected = Po × weight + bias
  # 파일명에 _P1_, _P2_ 등이 있으면 자동 감지 (우선순위 높음)
  # 없으면 selected_pc 사용
  pc_corrections:
    P1:
      Po_WD:   { weight: 1.0, bias: 0.0 }
      Po_Comp: { weight: 1.0, bias: 0.0 }
      Po_Fan:  { weight: 1.0, bias: 0.0 }
    P2:
      Po_WD:   { weight: 1.0, bias: 0.0 }
      Po_Comp: { weight: 1.0, bias: 0.0 }
      Po_Fan:  { weight: 1.0, bias: 0.0 }
    P3:
      Po_WD:   { weight: 1.0, bias: 0.0 }
      Po_Comp: { weight: 1.0, bias: 0.0 }
      Po_Fan:  { weight: 1.0, bias: 0.0 }
  selected_pc: "none"            # 파일명 자동 감지 실패 시 사용할 PC ("P1", "P2", "P3", "none")

  # 드럼 전력 추정 (Po_Drum 컬럼이 없을 때)
  drum_power:
    on_watts: 25
    off_watts: 10
    on_seconds: 56
    off_seconds: 4

  # 풍량 추정 계수 (CMM = Po_Fan / coeff_a * coeff_b)
  airflow_estimation:
    method: "fan_power"          # "fan_power" | "energy_balance"
    coeff_a: 57
    coeff_b: 3.2

  # 후처리 LPF 대상 컬럼
  calc_lpf_columns:
    - "Flow_ref_kgH_recalc"
    - "Flow_air_Cond_CMM"
    - "Flow_air_Eva_CMM"
    - "Qrefr_Eva_recalc"
    - "Qrefr_Cond_recalc"
  calc_lpf_tau: 10

# --- 컬럼 매핑 (기존과 동일) ---
column_mappings:
  ams:
    "RequestRpm": "Request_RPM"
    "CurrentRpm": "Current_RPM"
    "Cooling Fan": "HP_CoolingFan"
    "CompTargetHz[*10]": "HP_CompTargetHz"
    "CompCurrentHz": "HP_CompCurrentHz"
    "CompIpmTemp": "HP_CompIpmTemp"
