    "EevCurrentPosition": "HP_EEV_Position"
    "DryFtemp": "HP_F_Temp"
    "Fan IPM Temp": "HP_FanIpmTemp"
    "HP Fan QCurrent": "HP Fan Q Current"
    "_DRY_DUCT_IN_TEMP_": "Heatpump_DuctInTemp"
    "_DRY_DUCT_OUT_TEMP_": "Heatpump_DuctOutTemp"
    "_DRY_EVA_IN_TEMP_": "Heatpump_EvaInTemp"
    "_DRY_EVA_OUT_TEMP_": "Heatpump_EvaOutTemp"
    "Heatpump_CompTemp": "Heatpump_CompTemp"
    "SuperHeatDegree[*10]": "HP_SuperHeatDegree"
