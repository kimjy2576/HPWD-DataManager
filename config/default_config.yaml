    "소비전력량": "E_WD"
    "功率": "Po_WD"
    "耗电": "E_WD"
    "wash_thermistor_temperature": "TM_Wash"
  blackrose:
    "HeatPump PressSwitch": "Heatpump_PressSwitch"

ams_scale_factors:
  "HP_CompTargetHz": 0.1
  "HP_FanSpeed": 100.0
  "HP_SuperHeatDegree": 0.1
  "HP Comp Current": 0.1

subprocess_mapping:
